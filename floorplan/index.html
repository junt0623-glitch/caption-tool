<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>еұ•иҰ§дјҡеӣійқўдҪңжҲҗгӮўгғ—гғӘ - гғ—гғӯгғҲгӮҝгӮӨгғ—</title>
<style>
  :root{
    --ink:#1c1c1e;
    --paper:#fdfdfb;
    --grid:#e4e2da;
    --grid-major:#d0cdc2;
    --accent:#b3541e;      /* жңұ вҖ” йҒёжҠһгғ»дҪңе“Ғз•ӘеҸ· */
    --wall:#2b2b2e;
    --fixture:#8a8578;
    --case:#5c7c8a;        /* еҸҜеӢ•гӮұгғјгӮ№ */
    --panel:#f3f1ea;
    --line:#c9c5b8;
    --radius:6px;
    font-size:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Yu Gothic","Meiryo",sans-serif;
    color:var(--ink);background:var(--panel);
    display:flex;flex-direction:column;overflow:hidden;
  }

  /* в”Җв”Җ дёҠйғЁгғҗгғј в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
  header{
    display:flex;align-items:center;gap:12px;
    padding:8px 14px;background:var(--ink);color:#f5f3ec;flex-wrap:wrap;
  }
  header h1{font-size:15px;font-weight:600;letter-spacing:.06em;margin-right:8px}
  header h1 small{font-weight:400;opacity:.6;margin-left:6px;letter-spacing:.1em}
  .hbtn{
    background:transparent;color:#f5f3ec;border:1px solid #55534c;
    border-radius:var(--radius);padding:5px 12px;cursor:pointer;font-size:13px;
  }
  .hbtn:hover{background:#33322f}
  .hbtn.primary{background:var(--accent);border-color:var(--accent)}
  .hbtn.primary:hover{filter:brightness(1.1)}
  header .spacer{flex:1}
  header select, header input[type=number]{
    background:#33322f;color:#f5f3ec;border:1px solid #55534c;
    border-radius:var(--radius);padding:5px 8px;font-size:13px;
  }
  header input[type=number]{width:60px}
  header label{font-size:12px;opacity:.75}

  /* в”Җв”Җ гғЎгӮӨгғігғ¬гӮӨгӮўгӮҰгғҲ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
  main{flex:1;display:flex;min-height:0}

  /* гғ„гғјгғ«гғҗгғј */
  #toolbar{
    width:88px;background:#efede5;border-right:1px solid var(--line);
    display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:6px;
  }
  .tool{
    width:72px;padding:8px 4px;border:1px solid transparent;border-radius:var(--radius);
    background:transparent;cursor:pointer;font-size:11px;color:var(--ink);
    display:flex;flex-direction:column;align-items:center;gap:3px;
  }
  .tool span.ic{font-size:18px;line-height:1}
  .tool:hover{background:#e4e1d6}
  .tool.active{background:#fff;border-color:var(--accent);color:var(--accent);font-weight:600}
  #toolbar hr{width:56px;border:none;border-top:1px solid var(--line);margin:6px 0}

  /* гӮӯгғЈгғігғҗгӮ№й ҳеҹҹ */
  #canvasWrap{flex:1;position:relative;overflow:hidden;background:#dad7cc}
  svg#plan{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
  #zoomCtrl{
    position:absolute;left:12px;bottom:12px;display:flex;gap:4px;
    background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:4px;
  }
  #zoomCtrl button{border:none;background:transparent;width:28px;height:28px;cursor:pointer;font-size:15px;border-radius:4px}
  #zoomCtrl button:hover{background:var(--panel)}
  #hint{
    position:absolute;top:10px;left:50%;transform:translateX(-50%);
    background:rgba(28,28,30,.85);color:#f5f3ec;font-size:12px;
    padding:5px 14px;border-radius:20px;pointer-events:none;white-space:nowrap;
  }

  /* еҸігғ‘гғҚгғ« */
  #side{
    width:280px;background:var(--paper);border-left:1px solid var(--line);
    display:flex;flex-direction:column;min-height:0;
  }
  #side h2{
    font-size:12px;letter-spacing:.12em;font-weight:600;color:#6d6a60;
    padding:12px 14px 6px;border-bottom:1px solid var(--line);
  }
  #props{padding:12px 14px;border-bottom:1px solid var(--line)}
  #props .empty{font-size:12px;color:#8c887c}
  .field{margin-bottom:8px}
  .field label{display:block;font-size:11px;color:#6d6a60;margin-bottom:2px}
  .field input,.field textarea{
    width:100%;padding:5px 7px;border:1px solid var(--line);border-radius:4px;
    font-size:13px;font-family:inherit;background:#fff;
  }
  .field .pair{display:flex;gap:6px}
  .field .pair input{flex:1}
  #props .del{
    margin-top:4px;width:100%;padding:6px;border:1px solid #c33;color:#c33;
    background:#fff;border-radius:4px;cursor:pointer;font-size:12px;
  }
  #props .del:hover{background:#c33;color:#fff}
  .sbtn{
    flex:1;padding:5px 7px;border:1px solid var(--line);background:#fff;
    border-radius:4px;cursor:pointer;font-size:12px;
  }
  .sbtn:hover{border-color:var(--accent);color:var(--accent)}
  #props .note{font-size:11px;color:#8c887c;margin-bottom:8px}
  .algrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px}
  #props select{
    width:100%;padding:5px 7px;border:1px solid var(--line);border-radius:4px;
    font-size:13px;font-family:inherit;background:#fff;
  }

  /* гғ¬гӮӨгғӨгғјгғҗгғј */
  #layerBar{
    display:flex;flex-wrap:wrap;gap:4px 12px;padding:8px 14px;
    border-bottom:1px solid var(--line);font-size:12px;
  }
  #layerBar label{display:flex;align-items:center;gap:4px;cursor:pointer;color:var(--ink)}

  /* дҪңе“ҒгғӘгӮ№гғҲ */
  #workListWrap{flex:1;overflow-y:auto}
  #workList{list-style:none}
  #workList li{
    display:flex;align-items:center;gap:8px;padding:7px 14px;
    border-bottom:1px solid #eee9dd;cursor:pointer;font-size:13px;
  }
  #workList li:hover{background:var(--panel)}
  #workList li.sel{background:#fbe9dc}
  #workList .num{
    flex:none;min-width:22px;height:20px;border-radius:10px;padding:0 6px;
    background:var(--accent);color:#fff;font-size:11px;
    display:flex;align-items:center;justify-content:center;font-weight:600;
  }
  #workList .thumb{flex:none;width:34px;height:34px;object-fit:cover;border-radius:3px;border:1px solid var(--line)}
  #workList .meta{min-width:0;flex:1}
  #workList .meta .t{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #workList .meta .s{font-size:11px;color:#8c887c}
  #workList .none{padding:14px;font-size:12px;color:#8c887c}

  /* SVGеҶ…гҒ®иҰҒзҙ гӮ№гӮҝгӮӨгғ« */
  /* жіЁж„Ҹ: SVGгҒҜCSSгҒҢгғ—гғ¬гӮјгғігғҶгғјгӮ·гғ§гғіеұһжҖ§гӮҲгӮҠе„Әе…ҲгҒ•гӮҢгӮӢгҒҹгӮҒгҖҒ
     font-sizeзӯүгҒҜгҒ“гҒ“гҒ«жӣёгҒӢгҒҡеұһжҖ§еҒҙгҒ§жҢҮе®ҡгҒҷгӮӢ */
  .wall-line{stroke:var(--wall);stroke-linecap:square}
  .obj.selected .body{stroke:var(--accent);stroke-width:45}
  .badge circle{fill:var(--accent)}
  .badge text{fill:#fff;font-weight:600;text-anchor:middle;dominant-baseline:central}
  .obj text.lbl{fill:var(--ink);text-anchor:middle;pointer-events:none}
  .obj{cursor:move}
  .stock{cursor:copy}
  .stock.empty{cursor:not-allowed}
  .stock text.lbl{fill:var(--ink);text-anchor:middle;pointer-events:none}

  /* еҚ°еҲ· */
  @media print{
    header,#toolbar,#side,#zoomCtrl,#hint{display:none!important}
    body{background:#fff}
    #canvasWrap{position:fixed;inset:0;background:#fff}
  }
</style>
</head>
<body>

<header>
  <h1>еұ•иҰ§дјҡеӣійқўдҪңжҲҗ<small>гғ—гғӯгғҲгӮҝгӮӨгғ—</small></h1>
  <label>з”Ёзҙҷ
    <select id="sheetSel" title="еұ•зӨәе®ӨеӣійқўгҒҜA3гҒ®зҜ„еӣІеҶ…гҒ«жңҖеӨ§гӮөгӮӨгӮәгҒ§й…ҚзҪ®гҒ•гӮҢгҒҫгҒҷ">
      <option value="a3l" selected>A3 жЁӘ</option>
      <option value="a3p">A3 зёҰ</option>
    </select>
  </label>
  <label>зё®е°ә
    <input id="scalePct" type="number" min="1" max="100" step="1" value="100"
      title="еҸҜеӢ•гӮұгғјгӮ№гғ»еұ•зӨәеҸ°гҒ®еӣійқўгҒ«еҜҫгҒҷгӮӢеӨ§гҒҚгҒ•(1гҖң100%)"> %
  </label>
  <button class="hbtn" id="undoBtn" title="е…ғгҒ«жҲ»гҒҷ (Ctrl+Z)">вҶ© е…ғгҒ«жҲ»гҒҷ</button>
  <button class="hbtn" id="redoBtn" title="гӮ„гӮҠзӣҙгҒ— (Ctrl+Y / Ctrl+Shift+Z)">вҶӘ гӮ„гӮҠзӣҙгҒ—</button>
  <div class="spacer"></div>
  <button class="hbtn" id="wlBtn" title="дҪңе“ҒгғӘгӮ№гғҲ(CSV)гӮ’иӘӯгҒҝиҫјгҒҝгҖӮгҖҢз•ӘеҸ·гҖҚеҲ—гҒ®з•ӘеҸ·гҒҢеӣійқўгҒ«иЎЁзӨәгҒ•гӮҢгҒҫгҒҷ">рҹ“Ӣ дҪңе“ҒгғӘгӮ№гғҲ</button>
  <button class="hbtn" id="imgsBtn" title="дҪңе“Ғз”»еғҸгӮ’дёҖжӢ¬иӘӯгҒҝиҫјгҒҝгҖӮгғ•гӮЎгӮӨгғ«еҗҚгҒ®з•ӘеҸ·гҒЁгғӘгӮ№гғҲгҒ®з•ӘеҸ·гӮ’еҜҫеҝңд»ҳгҒ‘гҒҫгҒҷ">рҹ–ј дҪңе“Ғз”»еғҸ</button>
  <input type="file" id="wlInput" accept=".csv,.tsv,.txt" hidden>
  <input type="file" id="imgsInput" accept="image/*" multiple hidden>
  <button class="hbtn" id="loadBtn">рҹ“Ӯ иӘӯгҒҝиҫјгҒҝ</button>
  <button class="hbtn" id="saveBtn">рҹ’ҫ дҝқеӯҳ (JSON)</button>
  <button class="hbtn" id="pngBtn">рҹ–ј PNGжӣёгҒҚеҮәгҒ—</button>
  <button class="hbtn primary" id="printBtn">рҹ–Ё еҚ°еҲ·е®ҹиЎҢ</button>
  <input type="file" id="fileInput" accept=".json" hidden>
</header>

<main>
  <nav id="toolbar">
    <button class="tool active" data-tool="select"><span class="ic">вҶ–</span>йҒёжҠһ/з§»еӢ•</button>
    <button class="tool" data-tool="wall"><span class="ic">в•ұ</span>еЈҒгӮ’жҸҸгҒҸ</button>
    <hr>
    <button class="tool" data-tool="work"><span class="ic">рҹ–ј</span>дҪңе“Ғ</button>
    <button class="tool" data-tool="text"><span class="ic">гҒӮ</span>гғҶгӮӯгӮ№гғҲ</button>
    <hr>
    <button class="tool" data-tool="erase"><span class="ic">вң•</span>еүҠйҷӨ</button>
  </nav>

  <div id="canvasWrap">
    <svg id="plan" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="zoomCtrl">
      <button id="zoomOut" title="зё®е°Ҹ">вҲ’</button>
      <button id="zoomFit" title="е…ЁдҪ“иЎЁзӨә">вҢӮ</button>
      <button id="zoomIn" title="жӢЎеӨ§">пјӢ</button>
    </div>
    <div id="hint">гғ„гғјгғ«гӮ’йҒёгӮ“гҒ§еӣійқўдёҠгӮ’гӮҜгғӘгғғгӮҜ/гғүгғ©гғғгӮ°</div>
  </div>

  <aside id="side">
    <h2>гғ¬гӮӨгғӨгғј</h2>
    <div id="layerBar">
      <label><input type="checkbox" data-layer="room" checked>еұ•зӨәе®Өеӣійқў</label>
      <label><input type="checkbox" data-layer="furniture" checked>гӮұгғјгӮ№гғ»еұ•зӨәеҸ°</label>
      <label><input type="checkbox" data-layer="work" checked>дҪңе“Ғ</label>
      <label><input type="checkbox" data-layer="text" checked>гғҶгӮӯгӮ№гғҲ</label>
    </div>
    <h2>гғ—гғӯгғ‘гғҶгӮЈ</h2>
    <div id="props"><div class="empty">гӮӘгғ–гӮёгӮ§гӮҜгғҲгӮ’йҒёжҠһгҒҷгӮӢгҒЁз·ЁйӣҶгҒ§гҒҚгҒҫгҒҷ</div></div>
    <h2>дҪңе“ҒгғӘгӮ№гғҲ</h2>
    <div id="workListWrap"><ul id="workList"></ul></div>
  </aside>
</main>

<script>
"use strict";
/* ============================================================
   еұ•иҰ§дјҡеӣійқўдҪңжҲҗгӮўгғ—гғӘ(еҶҚж§ӢзҜүзүҲ)
   еҚҳдҪҚ: еҶ…йғЁеә§жЁҷгҒҜ mmгҖӮиЎЁзӨәгҒҜ 0.1px/mm гӮ’еҹәжә–гҒ«viewBoxгҒ§жӢЎзё®гҖӮ
   ============================================================ */

const SVG_NS = "http://www.w3.org/2000/svg";
const svg = document.getElementById("plan");
const GRID = 500;            // гӮ°гғӘгғғгғү 500mm
const WALL_T = 150;          // еЈҒеҺҡ 150mm
const SHEET = {w: 42000, h: 29700}; // еӣійқўзҜ„еӣІ(mm)гҖӮA3е®ҹеҜёГ—100гӮ’еҹәжә–гҒ«A3жЁӘ/зёҰгҒ§еҲҮжӣҝ
const PAPERS = {a3l:[420,297], a3p:[297,420]}; // A3е®ҹеҜё(mm)

/* ---- гғ¬гӮӨгғӨгғјж§ӢжҲҗ ----
   жңҖиғҢйқў: еұ•зӨәе®Өеӣійқў(state.rooms) вҶ’ еЈҒ вҶ’ гӮұгғјгӮ№гғ»еұ•зӨәеҸ° вҶ’ дҪңе“Ғ вҶ’ гғҶгӮӯгӮ№гғҲ(жңҖеүҚйқў)
   иЎЁзӨә/йқһиЎЁзӨәгҒҜ layerVis(дҝқеӯҳеҜҫиұЎеӨ–гҒ®гғ“гғҘгғјзҠ¶ж…Ӣ) */
const layerVis = {room:true, furniture:true, work:true, text:true};
const layerOf = o => o.type==="work" ? 1 : o.type==="text" ? 2 : 0;

/* еұ•зӨәе®ӨеӣійқўгҒ®гғҮгғ•гӮ©гғ«гғҲ4йқўгҖӮimg гҒҜиӘӯгҒҝиҫјгӮ“гҒ еӣійқўз”»еғҸ(dataURL) */
function defaultRooms(){
  return {current:"", list:[
    {id:"r1a1", name:"еұ•зӨәе®Ө1-AпјҲж—§з¬¬1пјү", img:null, scale:100, dx:0, dy:0, op:70},
    {id:"r1a2", name:"еұ•зӨәе®Ө1-AпјҲж—§з¬¬2пјү", img:null, scale:100, dx:0, dy:0, op:70},
    {id:"r1b",  name:"еұ•зӨәе®Ө1-B",          img:null, scale:100, dx:0, dy:0, op:70},
    {id:"r2b",  name:"еұ•зӨәе®Ө2-B",          img:null, scale:100, dx:0, dy:0, op:70},
  ]};
}

/* еҸҜеӢ•гӮұгғјгӮ№гғ»еұ•зӨәеҸ°гҒ®еңЁеә«гҖӮзЁ®йЎһгҒ”гҒЁ1гҒӨгҒ гҒ‘гғ‘гғ¬гғғгғҲиЎЁзӨәгҒ—гҖҒеҸ–гӮҠеҮәгҒҷгҒЁж®Ӣж•°гҒҢжёӣгӮӢгҖӮ
   ж®Ӣж•° = total - й…ҚзҪ®жёҲгҒҝгӮӨгғігӮ№гӮҝгғігӮ№ж•°(stockKeyгҒ§еҜҫеҝңд»ҳгҒ‘) */
function defaultStock(){
  return [
    {key:"c_alpha",  cat:"case", name:"Оұ",              w:2400, h:1800, total:2},
    {key:"c_beta",   cat:"case", name:"ОІ",              w:2400, h:1200, total:10},
    {key:"c_180",    cat:"case", name:"180и§’",          w:1800, h:1800, total:2},
    {key:"c_ym",     cat:"case", name:"жЁӘй•·е…ҚйңҮ",       w:1800, h:1000, total:5},
    {key:"c_ymb",    cat:"case", name:"жЁӘй•·е…ҚйңҮиғҢжҷҜ",   w:1800, h:1000, total:1},
    {key:"c_yh",     cat:"case", name:"жЁӘй•·йқһе…ҚйңҮ",     w:1800, h:1000, total:1},
    {key:"c_yhb",    cat:"case", name:"жЁӘй•·йқһе…ҚйңҮиғҢжҷҜ", w:1800, h:1000, total:2},
    {key:"c_andon",  cat:"case", name:"иЎҢзҮҲе…ҚйңҮ",       w:1000, h:1000, total:5},
    {key:"c_nozoki", cat:"case", name:"гҒ®гҒһгҒҚ",         w:1800, h:1000, total:5},
    {key:"p_153",    cat:"ped",  name:"1.53Г—0.9",       w:1530, h:900,  total:18},
    {key:"p_180",    cat:"ped",  name:"1.8Г—0.9",        w:1800, h:900,  total:12},
    {key:"p_090",    cat:"ped",  name:"0.9Г—0.9",        w:900,  h:900,  total:7},
    {key:"p_200",    cat:"ped",  name:"2.0Г—2.0",        w:2000, h:2000, total:2},
    {key:"p_120",    cat:"ped",  name:"1.2Г—0.9",        w:1200, h:900,  total:30},
  ];
}
function stockRemain(key){
  const s = state.stock.find(t=>t.key===key);
  return s ? s.total - state.objects.filter(o=>o.stockKey===key).length : 0;
}

/* ---- зҠ¶ж…Ӣ ---- */
let idSeq = 1;
let state = {
  meta: {title:"", venue:"", author:"", date: today()}, // JSONгғ•гӮЎгӮӨгғ«еҗҚзӯүгҒ§дҪҝз”ЁгҖӮеӣійқўдёҠгҒ«гҒҜиЎЁзӨәгҒ—гҒӘгҒ„
  sheet: {preset:"a3l"},
  scalePct: 100,           // гӮұгғјгӮ№гғ»еұ•зӨәеҸ°гҒ®иЎЁзӨәзё®е°ә(1гҖң100%)
  rooms: defaultRooms(),
  workList: [],            // дҪңе“ҒгғӘгӮ№гғҲ(CSV) [{no,title,artist}]
  images: {},              // дҪңе“Ғз”»еғҸ з•ӘеҸ·вҶ’dataURL(512pxгҒ«ең§зё®жёҲгҒҝ)
  stock: defaultStock(),
  walls: [],               // {id,x1,y1,x2,y2}
  objects: []              // {id,type:'work'|'case'|'fixture'|'text', x,y,w,h,rot, no,label,stockKey,img}
};
let tool = "select";
let selectedIds = new Set();  // иӨҮж•°йҒёжҠһгҖӮselectedId гҒҜдё»йҒёжҠһ(гғ—гғӯгғ‘гғҶгӮЈиЎЁзӨәгғ»ж•ҙеҲ—гҒ®еҹәжә–)
let selectedId = null;
let undoStack = [];
let redoStack = [];

/* йҒёжҠһгғҳгғ«гғ‘гғј */
function selectOnly(id){ selectedIds = new Set(id==null?[]:[id]); selectedId = id; }
function toggleSelect(id){
  if (selectedIds.has(id)){ selectedIds.delete(id); if (selectedId===id) selectedId = [...selectedIds].pop() ?? null; }
  else { selectedIds.add(id); selectedId = id; }
}
function clearSelect(){ selectedIds.clear(); selectedId = null; }

/* A3жЁӘ/зёҰгҒ®еӣійқўзҜ„еӣІгҖӮеұ•зӨәе®ӨеӣійқўгҒ®з”»еғҸгҒҜгҒ“гҒ®зҜ„еӣІеҶ…гҒ«жңҖеӨ§гӮөгӮӨгӮәгҒ§иҮӘеӢ•гғ•гӮЈгғғгғҲгҒҷгӮӢ */
function applySheet(){
  const paper = PAPERS[state.sheet?.preset] || PAPERS.a3l;
  SHEET.w = paper[0] * 100; SHEET.h = paper[1] * 100;
}
function syncSheetUI(){
  document.getElementById("sheetSel").value = PAPERS[state.sheet?.preset] ? state.sheet.preset : "a3l";
  document.getElementById("scalePct").value = state.scalePct ?? 100;
  applySheet();
}
/* зё®е°ә(1гҖң100%): еҸҜеӢ•гӮұгғјгӮ№гғ»еұ•зӨәеҸ°гҒ®еӣійқўгҒ«еҜҫгҒҷгӮӢиЎЁзӨәгӮөгӮӨгӮәеҖҚзҺҮ */
function fsc(){ return Math.min(100, Math.max(1, state.scalePct ?? 100)) / 100; }

/* ---- гғ“гғҘгғј(гӮәгғјгғ /гғ‘гғі) ---- */
/* еҲқжңҹиЎЁзӨәгҒҜгӮ·гғјгғҲ+е·ҰеҸігҒ®еңЁеә«еҲ—(еҚ°еҲ·зҜ„еӣІеӨ–)гҒҢиҰӢгҒҲгӮӢзҜ„еӣІ */
let view = {x:-4400, y:-1000, w: SHEET.w+8800, h: SHEET.h+2000};
function fitView(){
  const m = Math.max(SHEET.w, SHEET.h) * 0.05;
  view = {x:-m, y:-m, w:SHEET.w+m*2, h:SHEET.h+m*2};
  applyView();
}
function applyView(){
  const el = svg.getBoundingClientRect();
  const ar = el.width / el.height;
  let {x,y,w,h} = view;
  if (w/h < ar) { const nw = h*ar; x -= (nw-w)/2; w = nw; }
  else { const nh = w/ar; y -= (nh-h)/2; h = nh; }
  svg.setAttribute("viewBox", `${x} ${y} ${w} ${h}`);
}
function zoom(f, cx, cy){
  const pt = clientToPlan(cx ?? innerWidth/2, cy ?? innerHeight/2);
  view.w *= f; view.h *= f;
  view.x = pt.x - (pt.x - view.x)*f;
  view.y = pt.y - (pt.y - view.y)*f;
  applyView(); render();
}
function clientToPlan(cx, cy){
  const p = svg.createSVGPoint(); p.x = cx; p.y = cy;
  return p.matrixTransform(svg.getScreenCTM().inverse());
}
function snap(v){ return Math.round(v / (GRID/2)) * (GRID/2); }
const FINE = 50;            // з§»еӢ•жҷӮгҒ®зҙ°гҒӢгҒ„гӮ№гғҠгғғгғ—(50mm)
/* з§»еӢ•з”ЁгӮ№гғҠгғғгғ—: йҖҡеёёгҒҜ50mmеҲ»гҒҝгҖӮAltгӮӯгғјгҒ§гӮ№гғҠгғғгғ—з„ЎгҒ—(1mmеҚҳдҪҚгҒ§иҮӘз”ұгҒ«еӢ•гҒӢгҒӣгӮӢ) */
function snapMove(v, free){ return free ? Math.round(v) : Math.round(v / FINE) * FINE; }
/* гӮӘгғ–гӮёгӮ§гӮҜгғҲгҒ®иЎЁзӨәдёҠгҒ®еҚҠе№…гғ»еҚҠй«ҳ(зё®е°әгӮ’иҖғж…®)гҖӮж•ҙеҲ—гғ»зҜ„еӣІйҒёжҠһгҒ®еҪ“гҒҹгӮҠеҲӨе®ҡгҒ«дҪҝгҒҶ */
function halfExtent(o){
  if (o.type==="case" || o.type==="fixture"){ const f = fsc(); return [o.w*f/2, o.h*f/2]; }
  if (o.type==="work"){ return [o.w/2, o.h/2]; }
  return [0,0]; // text гҒҜзӮ№гҒЁгҒ—гҒҰжүұгҒҶ
}
/* йҒёжҠһдёӯгҒ®гӮӘгғ–гӮёгӮ§гӮҜгғҲгӮ’ж•ҙеҲ—/зӯүй–“йҡ”й…ҚзҪ®гҒҷгӮӢгҖӮеҹәжә–гҒҜйҒёжҠһе…ЁдҪ“гҒ®гғҗгӮҰгғігғҮгӮЈгғігӮ° */
function alignSelected(kind){
  const objs = state.objects.filter(o=>selectedIds.has(o.id));
  if (objs.length < 2) return;
  pushUndo();
  const ext = new Map(objs.map(o=>[o, halfExtent(o)]));
  const L = o=>o.x-ext.get(o)[0], R = o=>o.x+ext.get(o)[0];
  const T = o=>o.y-ext.get(o)[1], B = o=>o.y+ext.get(o)[1];
  const minL = Math.min(...objs.map(L)), maxR = Math.max(...objs.map(R));
  const minT = Math.min(...objs.map(T)), maxB = Math.max(...objs.map(B));
  if      (kind==="left")    objs.forEach(o=> o.x = minL + ext.get(o)[0]);
  else if (kind==="right")   objs.forEach(o=> o.x = maxR - ext.get(o)[0]);
  else if (kind==="hcenter") objs.forEach(o=> o.x = (minL+maxR)/2);
  else if (kind==="top")     objs.forEach(o=> o.y = minT + ext.get(o)[1]);
  else if (kind==="bottom")  objs.forEach(o=> o.y = maxB - ext.get(o)[1]);
  else if (kind==="vcenter") objs.forEach(o=> o.y = (minT+maxB)/2);
  else if (kind==="disth"){  // дёӯеҝғгӮ’жЁӘж–№еҗ‘гҒ«зӯүй–“йҡ”
    const s = [...objs].sort((a,b)=>a.x-b.x), step = (s[s.length-1].x - s[0].x)/(s.length-1);
    s.forEach((o,i)=> o.x = s[0].x + step*i);
  }
  else if (kind==="distv"){
    const s = [...objs].sort((a,b)=>a.y-b.y), step = (s[s.length-1].y - s[0].y)/(s.length-1);
    s.forEach((o,i)=> o.y = s[0].y + step*i);
  }
  render(); renderSide();
}
/* ж—ўеӯҳгҒ®еЈҒгҒ®з«ҜзӮ№гҒҢиҝ‘гҒҸгҒ«гҒӮгӮҢгҒ°гҒқгҒ“гҒёеҗёзқҖ(еЈҒгҒ®йҖЈзөҗ)гҖӮгҒӘгҒ‘гӮҢгҒ°гӮ°гғӘгғғгғүгӮ№гғҠгғғгғ— */
function snapWallPoint(p, excludeId){
  const R = 400; // еҗёзқҖеҚҠеҫ„(mm)
  let best = null, bd = R;
  for (const w of state.walls){
    if (w.id === excludeId) continue;
    for (const [ex,ey] of [[w.x1,w.y1],[w.x2,w.y2]]){
      const d = Math.hypot(p.x-ex, p.y-ey);
      if (d < bd){ bd = d; best = {x:ex, y:ey, joined:true}; }
    }
  }
  return best || {x:snap(p.x), y:snap(p.y), joined:false};
}
function today(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }

/* ---- еұҘжӯҙ ----
   з”»еғҸ(state.images / rooms.img / objects.img)гҒҜгӮөгӮӨгӮәгҒҢеӨ§гҒҚгҒ„гҒ®гҒ§еұҘжӯҙгҒӢгӮүйҷӨеӨ–гҒ—гҖҒ
   Undo/RedoгӮ’гҒҫгҒҹгҒ„гҒ§зҸҫеңЁгҒ®з”»еғҸгӮ’з¶ӯжҢҒгҒҷгӮӢ(з”»еғҸгҒ®иӘӯгҒҝиҫјгҒҝиҮӘдҪ“гҒҜеұҘжӯҙгҒ§жҲ»гӮүгҒӘгҒ„) */
function snapshot(){
  return JSON.stringify(state, (k,v)=> (k==="images" || k==="img") ? undefined : v);
}
function applySnapshot(json){
  const images = state.images || {};
  const roomImgs = {}; for (const r of state.rooms?.list||[]) roomImgs[r.id] = r.img;
  const objImgs = {};  for (const o of state.objects||[]) if (o.img) objImgs[o.id] = o.img;
  state = JSON.parse(json);
  state.images = images;
  for (const r of state.rooms?.list||[]) if (r.id in roomImgs) r.img = roomImgs[r.id];
  for (const o of state.objects||[]) if (objImgs[o.id]) o.img = objImgs[o.id];
}
function pushUndo(){
  undoStack.push(snapshot());
  if (undoStack.length > 50) undoStack.shift();
  redoStack.length = 0; // ж–°гҒ—гҒ„ж“ҚдҪңгҒ§гӮ„гӮҠзӣҙгҒ—еұҘжӯҙгҒҜз„ЎеҠ№гҒ«гҒӘгӮӢ
}
function undo(){
  if (!undoStack.length) return;
  redoStack.push(snapshot());
  applySnapshot(undoStack.pop());
  afterHistory();
}
function redo(){
  if (!redoStack.length) return;
  undoStack.push(snapshot());
  applySnapshot(redoStack.pop());
  afterHistory();
}
function afterHistory(){
  clearSelect(); syncSheetUI(); render(); renderSide();
}

/* ---- жҸҸз”» ---- */
function el(name, attrs, parent){
  const e = document.createElementNS(SVG_NS, name);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(e);
  return e;
}

function render(){
  svg.innerHTML = "";

  // з”Ёзҙҷ
  el("rect",{x:0,y:0,width:SHEET.w,height:SHEET.h,fill:"var(--paper)",stroke:"var(--ink)","stroke-width":30}, svg);

  // гӮ°гғӘгғғгғү
  const g = el("g",{}, svg);
  for (let x=0; x<=SHEET.w; x+=GRID)
    el("line",{x1:x,y1:0,x2:x,y2:SHEET.h,stroke: x%(GRID*4)?"var(--grid)":"var(--grid-major)","stroke-width":x%(GRID*4)?6:10}, g);
  for (let y=0; y<=SHEET.h; y+=GRID)
    el("line",{x1:0,y1:y,x2:SHEET.w,y2:y,stroke: y%(GRID*4)?"var(--grid)":"var(--grid-major)","stroke-width":y%(GRID*4)?6:10}, g);

  // еұ•зӨәе®Өеӣійқў(жңҖиғҢйқўгғ¬гӮӨгғӨгғј)
  const room = state.rooms?.list.find(r=>r.id===state.rooms.current);
  if (layerVis.room && room?.img){
    el("image",{href:room.img, x:room.dx||0, y:room.dy||0,
      width:SHEET.w*(room.scale??100)/100, height:SHEET.h*(room.scale??100)/100,
      preserveAspectRatio:"xMinYMin meet", opacity:(room.op??70)/100,
      "pointer-events":"none"}, svg);
  }

  // еЈҒ
  for (const w of state.walls){
    const ln = el("line",{x1:w.x1,y1:w.y1,x2:w.x2,y2:w.y2,"stroke-width":WALL_T,class:"wall-line","data-id":w.id}, svg);
    if (selectedIds.has(w.id)) ln.style.stroke = "var(--accent)"; // inline styleгҒ§CSSгӮҜгғ©гӮ№гҒ«еӢқгҒҹгҒӣгӮӢ
  }

  // еңЁеә«гғ‘гғ¬гғғгғҲ(еҚ°еҲ·зҜ„еӣІгҒ®еӨ–): гӮұгғјгӮ№гҒҜе·Ұгғ»еұ•зӨәеҸ°гҒҜеҸігҒ«зЁ®йЎһгҒ”гҒЁ1гҒӨ+ж®Ӣж•°гӮ’зёҰдёҖеҲ—гҒ§иЎЁзӨәгҖӮ
  // гӮҜгғӘгғғгӮҜ(гғүгғ©гғғгӮ°)гҒ§1еҸ°еҸ–гӮҠеҮәгҒҷгҖӮж®Ӣ0гҒҜгӮ°гғ¬гғјиЎЁзӨә
  const f = fsc();
  if (layerVis.furniture){
    let ly = 400, ry = 400;
    const GAPP = 500;
    for (const s of state.stock){
      const remain = stockRemain(s.key);
      const isCase = s.cat === "case";
      const w = s.w*f, h = s.h*f;
      const x = isCase ? -2400 : SHEET.w + 2400;
      const y = (isCase ? ly : ry) + h/2;
      const col = isCase ? "var(--case)" : "var(--fixture)";
      const g = el("g",{class:"stock"+(remain?"":" empty"),"data-stock":s.key,
        transform:`translate(${x},${y})`}, svg);
      el("rect",{x:-w/2,y:-h/2,width:w,height:h,fill:col,"fill-opacity":remain?.18:.05,
        stroke:col,"stroke-width":25,"stroke-dasharray":remain?"":"120 80"}, g);
      const lbl = el("text",{class:"lbl","font-size":240,y:-40}, g);
      lbl.textContent = s.name;
      const cnt = el("text",{class:"lbl","font-size":220,y:250,fill:remain?"var(--accent)":"#999",
        "font-weight":600}, g);
      cnt.textContent = `ж®Ӣ ${remain}`;
      if (isCase) ly += h + GAPP; else ry += h + GAPP;
    }
  }

  // гӮӘгғ–гӮёгӮ§гӮҜгғҲ: гғ¬гӮӨгғӨгғјй Ҷ(гӮұгғјгӮ№гғ»еұ•зӨәеҸ° вҶ’ дҪңе“Ғ вҶ’ гғҶгӮӯгӮ№гғҲ)гҒ«жҸҸз”»гҖӮе®үе®ҡгӮҪгғјгғҲгҒӘгҒ®гҒ§еҗҢгғ¬гӮӨгғӨгғјеҶ…гҒҜй…ҚеҲ—й Ҷ
  const layerShown = o => [layerVis.furniture, layerVis.work, layerVis.text][layerOf(o)];
  for (const o of [...state.objects].sort((a,b)=>layerOf(a)-layerOf(b))){
    if (!layerShown(o)) continue;
    const grp = el("g",{class:"obj"+(selectedIds.has(o.id)?" selected":""),"data-id":o.id,
      transform:`translate(${o.x},${o.y}) rotate(${o.rot||0})`}, svg);

    if (o.type === "work"){
      el("rect",{class:"body",x:-o.w/2,y:-o.h/2,width:o.w,height:o.h,fill:"#fff",stroke:"var(--ink)","stroke-width":20}, grp);
      const img = state.images[String(o.no)] || o.img;
      if (img)
        el("image",{href:img,x:-o.w/2,y:-o.h/2,width:o.w,height:o.h,
          preserveAspectRatio:"xMidYMid meet","pointer-events":"none"}, grp);
      else
        el("line",{x1:-o.w/2,y1:o.h/2,x2:o.w/2,y2:-o.h/2,stroke:"#bbb","stroke-width":10}, grp);
      // еӣійқўдёҠгҒҜгҖҢз•ӘеҸ·гҖҚгҒ®гҒҝиЎЁзӨә(дҪңе“ҒеҗҚзӯүгҒҜеҮәгҒ•гҒӘгҒ„)
      const b = el("g",{class:"badge",transform:`translate(0,${-o.h/2-260})`}, grp);
      const bw = Math.max(400, String(o.no??"").length*130 + 160);
      el("rect",{x:-bw/2,y:-200,width:bw,height:400,rx:200,fill:"var(--accent)"}, b);
      const t = el("text",{}, b); t.textContent = o.no ?? "";
      t.setAttribute("font-size", 220);
    }
    else if (o.type === "case" || o.type === "fixture"){
      const w = o.w*f, h = o.h*f; // зё®е°ә(1гҖң100%)гӮ’йҒ©з”Ё
      const col = o.type === "case" ? "var(--case)" : "var(--fixture)";
      el("rect",{class:"body",x:-w/2,y:-h/2,width:w,height:h,fill:col,
        "fill-opacity":o.type==="case"?.18:.25,stroke:col,"stroke-width":o.type==="case"?25:20}, grp);
      const lbl = el("text",{class:"lbl","font-size":Math.max(120, 240*f)}, grp);
      lbl.textContent = o.label || (o.type==="case"?"гӮұгғјгӮ№":"еұ•зӨәеҸ°");
    }
    else if (o.type === "text"){
      const t = el("text",{class:"lbl body","font-size":320,"font-weight":600}, grp);
      t.textContent = o.label || "гғҶгӮӯгӮ№гғҲ";
      el("rect",{x:-800,y:-260,width:1600,height:520,fill:"transparent"}, grp); // гӮҜгғӘгғғгӮҜй ҳеҹҹ
    }
  }

  applyView();
}

/* ---- гӮөгӮӨгғүгғ‘гғҚгғ« ---- */

      html += `<div class="field"><label>е№… Г— еҘҘиЎҢ (mm)</label><div class="pair">

        <button class="sbtn" id="pImgBtn">${obj.img?"з”»еғҸгӮ’е·®гҒ—жӣҝгҒҲ":"рҹ“Ӯ з”»еғҸгӮ’йҒёжҠһ"}</button>
        ${obj.img?`<button class="sbtn" id="pImgDel">еӨ–гҒҷ</button>`:""}

    if (pImgBtn) pImgBtn.onclick = ()=> pImgFile.click();

function fld(label,key,val){
  return `<div class="field"><label>${label}</label><input data-key="${key}" value="${esc(val||"")}"></div>`;
}
function esc(s){ return String(s??"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }

/* ---- дҪңе“ҒгғӘгӮ№гғҲ(CSV)гғ»дҪңе“Ғз”»еғҸгҒ®иӘӯгҒҝиҫјгҒҝ ---- */
/* з•ӘеҸ·гҒ®жӯЈиҰҸеҢ–: е…Ёи§’ж•°еӯ—вҶ’еҚҠи§’гҒ«гҒ—гҒҰж•°еӯ—йғЁеҲҶгӮ’еҸ–гӮҠеҮәгҒҷ(е…Ҳй ӯгӮјгғӯгҒҜиҗҪгҒЁгҒҷ)гҖӮ
   дҪңе“ҒгғӘгӮ№гғҲгҒ®гҖҢз•ӘеҸ·гҖҚгҒЁгғ•гӮЎгӮӨгғ«еҗҚ(дҫӢ: 10001.jpg)гӮ’гҒ“гӮҢгҒ§еҜҫеҝңд»ҳгҒ‘гӮӢ */
function normNo(v){
  const s = String(v??"").replace(/[пјҗ-пјҷ]/g, c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
  const m = s.match(/\d+/);
  return m ? String(+m[0]) : "";
}
/* ExcelжӣёгҒҚеҮәгҒ—гҒ®CSVгҒҜShift_JISгҒҢеӨҡгҒ„гҒҹгӮҒгҖҒUTF-8гҒ§еҢ–гҒ‘гҒҹгӮүиӘӯгҒҝзӣҙгҒҷ */
async function decodeText(file){
  const buf = await file.arrayBuffer();
  let t = new TextDecoder("utf-8").decode(buf);
  if (t.includes("пҝҪ")) t = new TextDecoder("shift_jis").decode(buf);
  return t;
}
function splitLine(line, sep){
  const out = []; let cur = "", q = false;
  for (let i=0;i<line.length;i++){
    const ch = line[i];
    if (q){ if (ch === '"'){ if (line[i+1] === '"'){ cur += '"'; i++; } else q = false; } else cur += ch; }
    else if (ch === '"') q = true;
    else if (ch === sep){ out.push(cur); cur = ""; }
    else cur += ch;
  }
  out.push(cur);
  return out;
}
function parseWorkList(text){
  const sep = text.includes("\t") ? "\t" : ",";
  const rows = text.split(/\r?\n/).filter(l=>l.trim()).map(l=>splitLine(l, sep).map(c=>c.trim()));
  if (!rows.length) return [];
  let noI = 0, titleI = 1, artistI = -1, start = 0;
  const head = rows[0];
  if (head.some(c=>/з•ӘеҸ·|дҪңе“ҒеҗҚ|гӮҝгӮӨгғҲгғ«|йЎҢеҗҚ|дҪңе®¶|дҪңиҖ…|^No\.?$/i.test(c))){
    start = 1;
    const n = head.findIndex(c=>/з•ӘеҸ·|^No\.?$|^NO$/i.test(c)); if (n >= 0) noI = n;
    const t = head.findIndex(c=>/дҪңе“ҒеҗҚ|гӮҝгӮӨгғҲгғ«|йЎҢеҗҚ/.test(c));  if (t >= 0) titleI = t;
    const a = head.findIndex(c=>/дҪңе®¶|дҪңиҖ…/.test(c));            if (a >= 0) artistI = a;
  }
  const list = [];
  for (const r of rows.slice(start)){
    const no = normNo(r[noI]);
    if (!no) continue;
    list.push({no, title: r[titleI] ?? "", artist: artistI >= 0 ? (r[artistI] ?? "") : ""});
  }
  return list;
}
/* иЎЁзӨәз”ЁгҒ«и»ҪгҒҸең§зё®(й•·иҫә512pxгғ»JPEG)гҒ—гҒҰdataURLеҢ–гҒҷгӮӢ */
function compressImage(file){
  return new Promise((res, rej)=>{
    const img = new Image();
    img.onload = ()=>{
      const MAX = 512, r = Math.min(1, MAX/Math.max(img.width, img.height));
      const c = document.createElement("canvas");
      c.width = Math.max(1, Math.round(img.width*r));
      c.height = Math.max(1, Math.round(img.height*r));
      c.getContext("2d").drawImage(img, 0, 0, c.width, c.height);
      URL.revokeObjectURL(img.src);
      res(c.toDataURL("image/jpeg", 0.72));
    };
    img.onerror = ()=>{ URL.revokeObjectURL(img.src); rej(new Error("з”»еғҸгӮ’й–ӢгҒ‘гҒҫгҒӣгӮ“")); };
    img.src = URL.createObjectURL(file);
  });
}

/* ---- гғқгӮӨгғігӮҝж“ҚдҪң ---- */
let drag = null; // {mode:'wall'|'move'|'pan', ...}
const pointers = new Map(); // гӮўгӮҜгғҶгӮЈгғ–гҒӘгғқгӮӨгғігӮҝ(гғ”гғігғҒгӮәгғјгғ еҲӨе®ҡз”Ё)
let pinch = null;           // {d,cx,cy} зӣҙеүҚгғ•гғ¬гғјгғ гҒ®2жң¬жҢҮй–“и·қйӣўгҒЁдёӯзӮ№

svg.addEventListener("pointerdown", ev=>{
  svg.setPointerCapture(ev.pointerId);
  pointers.set(ev.pointerId, {x:ev.clientX, y:ev.clientY});
  if (pointers.size === 2){
    // 2жң¬зӣ®гҒ®жҢҮгҒҢи§ҰгӮҢгҒҹгӮүгғ”гғігғҒй–Ӣе§ӢгҖӮжҸҸгҒҚгҒӢгҒ‘гҒ®еЈҒгҒҜз ҙжЈ„гҒҷгӮӢ
    if (drag?.mode === "wall"){ state.walls.pop(); undoStack.pop(); render(); }
    drag = null;
    const [p1,p2] = [...pointers.values()];
    pinch = {d: Math.hypot(p1.x-p2.x, p1.y-p2.y), cx:(p1.x+p2.x)/2, cy:(p1.y+p2.y)/2};
    return;
  }
  if (pointers.size > 2) return;
  const p = clientToPlan(ev.clientX, ev.clientY);
  const hit = ev.target.closest("[data-id]");

  // еңЁеә«гғ‘гғ¬гғғгғҲгҒӢгӮү1еҸ°еҸ–гӮҠеҮәгҒҷ(ж®Ӣж•°гҒҢжёӣгӮӢ)гҖӮгҒқгҒ®гҒҫгҒҫгғүгғ©гғғгӮ°гҒ§й…ҚзҪ®гҒ§гҒҚгӮӢ
  const stockHit = ev.target.closest("[data-stock]");
  if (stockHit && tool !== "erase"){
    const s = state.stock.find(t=>t.key===stockHit.dataset.stock);
    if (s && stockRemain(s.key) > 0){
      pushUndo();
      const o = {id:idSeq++, type:s.cat==="case"?"case":"fixture", stockKey:s.key,
        x:snap(p.x), y:snap(p.y), rot:0, w:s.w, h:s.h, label:s.name};
      state.objects.push(o);
      selectOnly(o.id);
      setTool("select");
      drag = {mode:"move", start:{x:p.x,y:p.y}, items:[{obj:o, ox:o.x, oy:o.y}], primary:{obj:o, ox:o.x, oy:o.y}};
      render(); renderSide();
    }
    return;
  }

  if (tool === "wall"){
    pushUndo();
    const sp = snapWallPoint(p);
    const w = {id: idSeq++, x1:sp.x, y1:sp.y, x2:sp.x, y2:sp.y};
    state.walls.push(w);
    drag = {mode:"wall", wall:w};
    return;
  }
  if (tool === "work"){
    pushUndo();
    // дҪңе“ҒгғӘгӮ№гғҲгҒ®жңӘй…ҚзҪ®гҒ®е…Ҳй ӯз•ӘеҸ·гӮ’иҮӘеӢ•гҒ§еүІгӮҠеҪ“гҒҰгӮӢ(гғӘгӮ№гғҲгҒҢз„ЎгҒ‘гӮҢгҒ°йҖЈз•Ә)
    const used = new Set(state.objects.filter(o=>o.type==="work").map(o=>String(o.no)));
    let no = state.workList.find(w=>!used.has(String(w.no)))?.no;
    if (no == null){
      const nums = [...used].map(Number).filter(n=>!isNaN(n));
      no = (nums.length ? Math.max(...nums) : 0) + 1;
    }
    const o = {id:idSeq++, type:"work", no, x:snap(p.x), y:snap(p.y), rot:0, w:1200, h:900};
    state.objects.push(o);
    selectOnly(o.id);
    setTool("select");
    render(); renderSide();
    return;
  }
  if (tool === "text"){
    pushUndo();
    const o = {id:idSeq++, type:"text", x:snap(p.x), y:snap(p.y), rot:0, w:0, h:0, label:"гғҶгӮӯгӮ№гғҲ"};
    state.objects.push(o);
    selectOnly(o.id);
    setTool("select");
    render(); renderSide();
    return;
  }
  if (tool === "erase"){
    if (hit){ selectOnly(+hit.dataset.id); deleteSelected(); }
    return;
  }
  // select / иӨҮж•°йҒёжҠһ / з§»еӢ•
  const multiKey = ev.shiftKey || ev.ctrlKey || ev.metaKey;
  if (hit){
    const id = +hit.dataset.id;
    if (multiKey){
      // йҒёжҠһгҒ«иҝҪеҠ /йҷӨеӨ–(гғүгғ©гғғгӮ°з§»еӢ•гҒҜгҒ—гҒӘгҒ„)
      toggleSelect(id);
      render(); renderSide();
    } else {
      // жңӘйҒёжҠһгҒ®гӮӮгҒ®гӮ’гӮҜгғӘгғғгӮҜгҒ—гҒҹгӮүеҚҳзӢ¬йҒёжҠһгҖӮйҒёжҠһжёҲгҒҝгҒӘгӮүгӮ°гғ«гғјгғ—е…ЁдҪ“гӮ’гғүгғ©гғғгӮ°
      if (!selectedIds.has(id)) selectOnly(id);
      pushUndo();
      const items = [];
      let primary = null;
      for (const o of state.objects){
        if (!selectedIds.has(o.id)) continue;
        const it = {obj:o, ox:o.x, oy:o.y};
        items.push(it);
        if (o.id === id) primary = it;
      }
      if (primary) drag = {mode:"move", start:{x:p.x,y:p.y}, items, primary};
      render(); renderSide();
    }
  } else if (multiKey){
    // з©әзҷҪгӮ’Shift/Ctrl+гғүгғ©гғғгӮ° вҶ’ зҜ„еӣІйҒёжҠһ(гғһгғјгӮӯгғј)
    drag = {mode:"marquee", x0:p.x, y0:p.y, add:selectedIds};
  } else {
    clearSelect();
    drag = {mode:"pan", sx:ev.clientX, sy:ev.clientY, view:{...view}};
    render(); renderSide();
  }
});

svg.addEventListener("pointermove", ev=>{
  if (pointers.has(ev.pointerId)) pointers.set(ev.pointerId, {x:ev.clientX, y:ev.clientY});
  if (pinch && pointers.size >= 2){
    const [p1,p2] = [...pointers.values()];
    const d = Math.hypot(p1.x-p2.x, p1.y-p2.y);
    const cx = (p1.x+p2.x)/2, cy = (p1.y+p2.y)/2;
    if (d > 0 && pinch.d > 0) zoom(pinch.d / d, cx, cy); // жҢҮгӮ’еәғгҒ’гӮӢвҶ’жӢЎеӨ§
    const scale = view.w / svg.getBoundingClientRect().width;
    view.x -= (cx - pinch.cx) * scale;
    view.y -= (cy - pinch.cy) * scale;
    applyView();
    pinch = {d, cx, cy};
    return;
  }
  if (!drag) return;
  const p = clientToPlan(ev.clientX, ev.clientY);
  if (drag.mode === "wall"){
    const sp = snapWallPoint(p, drag.wall.id);
    let x2 = sp.x, y2 = sp.y;
    if (!sp.joined && !ev.shiftKey){ // з«ҜзӮ№йҖЈзөҗжҷӮд»ҘеӨ–гҒҜзӣҙдәӨгӮ№гғҠгғғгғ—гҖҒShiftгҒ§иҮӘз”ұи§’еәҰ
      if (Math.abs(x2-drag.wall.x1) > Math.abs(y2-drag.wall.y1)) y2 = drag.wall.y1;
      else x2 = drag.wall.x1;
    }
    drag.wall.x2 = x2; drag.wall.y2 = y2;
    render();
  }
  else if (drag.mode === "move"){
    // дё»йҒёжҠһгӮ’50mm(AltгҒ§гғ•гғӘгғј)гӮ№гғҠгғғгғ—гҒ—гҖҒгҒқгҒ®з§»еӢ•йҮҸгӮ’йҒёжҠһе…ЁдҪ“гҒёйҒ©з”Ё
    const pr = drag.primary;
    const nx = snapMove(pr.ox + (p.x - drag.start.x), ev.altKey);
    const ny = snapMove(pr.oy + (p.y - drag.start.y), ev.altKey);
    const dx = nx - pr.ox, dy = ny - pr.oy;
    for (const it of drag.items){ it.obj.x = it.ox + dx; it.obj.y = it.oy + dy; }
    render();
  }
  else if (drag.mode === "marquee"){
    drag.x1 = p.x; drag.y1 = p.y;
    render();
    const x = Math.min(drag.x0, p.x), y = Math.min(drag.y0, p.y);
    el("rect",{x, y, width:Math.abs(p.x-drag.x0), height:Math.abs(p.y-drag.y0),
      fill:"var(--accent)","fill-opacity":.08, stroke:"var(--accent)","stroke-width":30,
      "stroke-dasharray":"120 90","pointer-events":"none"}, svg);
  }
  else if (drag.mode === "pan"){
    const scale = view.w / svg.getBoundingClientRect().width;
    view.x = drag.view.x - (ev.clientX - drag.sx)*scale;
    view.y = drag.view.y - (ev.clientY - drag.sy)*scale;
    applyView();
  }
});

svg.addEventListener("pointerup", ev=>{
  pointers.delete(ev.pointerId);
  if (pointers.size < 2) pinch = null;
  if (drag?.mode === "wall"){
    const w = drag.wall;
    if (w.x1===w.x2 && w.y1===w.y2){ state.walls.pop(); undoStack.pop(); } // й•·гҒ•0гҒҜз ҙжЈ„
    render();
  }
  else if (drag?.mode === "marquee"){
    // зҜ„еӣІгҒ«дёӯеҝғгҒҢе…ҘгӮӢгӮӘгғ–гӮёгӮ§гӮҜгғҲгӮ’йҒёжҠһ(ж—ўеӯҳйҒёжҠһгҒ«иҝҪеҠ )
    if (drag.x1 != null){
      const x0 = Math.min(drag.x0, drag.x1), x1 = Math.max(drag.x0, drag.x1);
      const y0 = Math.min(drag.y0, drag.y1), y1 = Math.max(drag.y0, drag.y1);
      for (const o of state.objects){
        if (!layerVis[["furniture","work","text"][layerOf(o)]]) continue;
        if (o.x>=x0 && o.x<=x1 && o.y>=y0 && o.y<=y1){ selectedIds.add(o.id); selectedId = o.id; }
      }
    }
    render(); renderSide();
  }
  drag = null;
});
svg.addEventListener("pointercancel", ev=>{
  pointers.delete(ev.pointerId);
  if (pointers.size < 2) pinch = null;
  drag = null;
});

svg.addEventListener("wheel", ev=>{
  ev.preventDefault();
  zoom(ev.deltaY > 0 ? 1.1 : 0.9, ev.clientX, ev.clientY);
},{passive:false});

/* ---- гғ„гғјгғ«еҲҮжӣҝ ---- */
function setTool(t){
  tool = t;
  document.querySelectorAll(".tool").forEach(b=>b.classList.toggle("active", b.dataset.tool===t));
  const hints = {
    select:"гӮҜгғӘгғғгӮҜйҒёжҠһ/гғүгғ©гғғгӮ°з§»еӢ•(50mmеҲ»гҒҝгҖҒAltгҒ§иҮӘз”ұ)гҖӮShift+гӮҜгғӘгғғгӮҜгҒ§иӨҮж•°йҒёжҠһгҖҒShift+з©әзҷҪгғүгғ©гғғгӮ°гҒ§зҜ„еӣІйҒёжҠһвҶ’ж•ҙеҲ—",
    wall:"гғүгғ©гғғгӮ°гҒ§еЈҒгӮ’жҸҸз”»(ShiftгҒ§иҮӘз”ұи§’еәҰгҖҒж—ўеӯҳгҒ®еЈҒгҒ®з«ҜзӮ№гҒ«иҝ‘гҒҘгҒ‘гӮӢгҒЁйҖЈзөҗ)",
    work:"гӮҜгғӘгғғгӮҜгҒ§дҪңе“ҒгӮ’й…ҚзҪ®(дҪңе“ҒгғӘгӮ№гғҲгҒ®жңӘй…ҚзҪ®гҒ®з•ӘеҸ·гҒҢиҮӘеӢ•гҒ§д»ҳгҒҚгҒҫгҒҷ)",
    text:"гӮҜгғӘгғғгӮҜгҒ§гғҶгӮӯгӮ№гғҲгӮ’й…ҚзҪ®",
    erase:"гӮҜгғӘгғғгӮҜгҒ—гҒҹгӮӘгғ–гӮёгӮ§гӮҜгғҲгӮ’еүҠйҷӨ(гӮұгғјгӮ№гғ»еұ•зӨәеҸ°гҒҜеңЁеә«гҒ«жҲ»гӮҠгҒҫгҒҷ)"
  };
  document.getElementById("hint").textContent = hints[t];
}
document.querySelectorAll(".tool").forEach(b=> b.onclick = ()=> setTool(b.dataset.tool));

/* ---- гғ¬гӮӨгғӨгғјиЎЁзӨәеҲҮжӣҝ ---- */
document.querySelectorAll("#layerBar input").forEach(cb=>{
  cb.onchange = ()=>{ layerVis[cb.dataset.layer] = cb.checked; render(); };
});

/* ---- гӮӯгғјгғңгғјгғү ---- */
window.addEventListener("keydown", ev=>{
  if (ev.target.matches("input,textarea")) return;
  if ((ev.ctrlKey||ev.metaKey) && ev.key.toLowerCase()==="z" && !ev.shiftKey){ ev.preventDefault(); undo(); }
  else if ((ev.ctrlKey||ev.metaKey) && (ev.key.toLowerCase()==="y" || (ev.key.toLowerCase()==="z" && ev.shiftKey))){ ev.preventDefault(); redo(); }
  else if ((ev.ctrlKey||ev.metaKey) && ev.key.toLowerCase()==="a"){ // е…ЁгӮӘгғ–гӮёгӮ§гӮҜгғҲйҒёжҠһ
    ev.preventDefault();
    selectedIds = new Set(state.objects.filter(o=>layerVis[["furniture","work","text"][layerOf(o)]]).map(o=>o.id));
    selectedId = [...selectedIds].pop() ?? null;
    render(); renderSide();
  }
  else if (ev.key==="Delete" || ev.key==="Backspace"){ deleteSelected(); }
  else if (ev.key==="Escape"){ clearSelect(); setTool("select"); render(); renderSide(); }
});

/* ---- дҝқеӯҳ / иӘӯгҒҝиҫјгҒҝ / жӣёгҒҚеҮәгҒ— ---- */
document.getElementById("saveBtn").onclick = ()=>{
  const blob = new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${state.meta.title||"floorplan"}_${state.meta.date}.json`;
  a.click(); URL.revokeObjectURL(a.href);
};
document.getElementById("loadBtn").onclick = ()=> document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange = async ev=>{
  const f = ev.target.files[0]; if (!f) return;
  try{
    const data = JSON.parse(await f.text());
    if (!data.walls || !data.objects) throw new Error("еҪўејҸгҒҢйҒ•гҒ„гҒҫгҒҷ");
    pushUndo();
    state = data;
    // ж—§еҪўејҸJSONгҒЁгҒ®дә’жҸӣ
    if (!state.sheet || !PAPERS[state.sheet.preset]) state.sheet = {preset:"a3l"};
    if (!state.rooms) state.rooms = defaultRooms();
    if (!state.scalePct) state.scalePct = 100;
    if (!state.workList) state.workList = [];
    if (!state.images) state.images = {};
    if (!state.stock) state.stock = defaultStock();
    idSeq = Math.max(0, ...state.walls.map(w=>w.id), ...state.objects.map(o=>o.id)) + 1;
    clearSelect(); syncSheetUI(); render(); renderSide();
  }catch(e){ alert("иӘӯгҒҝиҫјгҒҝгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ: " + e.message); }
  ev.target.value = "";
};
document.getElementById("pngBtn").onclick = ()=>{
  const clone = svg.cloneNode(true);
  clone.setAttribute("viewBox", `-300 -300 ${SHEET.w+600} ${SHEET.h+600}`);
  clone.setAttribute("width", 2400);
  clone.setAttribute("height", Math.round(2400*SHEET.h/SHEET.w));
  // еӨ–йғЁCSSгҒҜгӮ·гғӘгӮўгғ©гӮӨгӮәгҒ•гӮҢгҒӘгҒ„гҒҹгӮҒгҖҒеҝ…иҰҒгҒӘгӮ№гӮҝгӮӨгғ«гӮ’SVGеҶ…гҒ«еҹӢгӮҒиҫјгӮҖ
  const css = getComputedStyle(document.documentElement);
  const v = name => css.getPropertyValue(name).trim();
  const styleTag = document.createElementNS(SVG_NS, "style");
  styleTag.textContent = `
    .wall-line{stroke:${v("--wall")};stroke-linecap:square}
    .badge circle{fill:${v("--accent")}}
    .badge text{fill:#fff;font-weight:600;text-anchor:middle;dominant-baseline:central}
    .obj text.lbl{fill:${v("--ink")};text-anchor:middle}
    text{font-family:sans-serif}`;
  clone.insertBefore(styleTag, clone.firstChild);
  let str = new XMLSerializer().serializeToString(clone);
  for (const v of ["--paper","--ink","--grid","--grid-major","--accent","--wall","--fixture","--case"])
    str = str.replaceAll(`var(${v})`, css.getPropertyValue(v).trim());
  str = str.replace("<svg", `<svg style="font-family:sans-serif"`);
  const img = new Image();
  img.onload = ()=>{
    const c = document.createElement("canvas");
    c.width = 2400; c.height = Math.round(2400*SHEET.h/SHEET.w);
    const ctx = c.getContext("2d");
    ctx.fillStyle = "#fff"; ctx.fillRect(0,0,c.width,c.height);
    ctx.drawImage(img,0,0,c.width,c.height);
    const a = document.createElement("a");
    a.href = c.toDataURL("image/png");
    a.download = `${state.meta.title||"floorplan"}.png`;
    a.click();
  };
  img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(str);
};
document.getElementById("printBtn").onclick = ()=>{
  const prev = {...view};
  view = {x:-300,y:-300,w:SHEET.w+600,h:SHEET.h+600}; applyView();
  window.print();
  view = prev; applyView();
};
document.getElementById("sheetSel").onchange = ev=>{
  pushUndo();
  state.sheet = {preset: ev.target.value};
  applySheet(); fitView(); render();
};
document.getElementById("scalePct").onchange = ev=>{
  pushUndo();
  state.scalePct = Math.min(100, Math.max(1, Math.round(+ev.target.value || 100)));
  ev.target.value = state.scalePct;
  render();
};

/* дҪңе“ҒгғӘгӮ№гғҲ(CSV)гҒ®иӘӯгҒҝиҫјгҒҝ */
document.getElementById("wlBtn").onclick = ()=> document.getElementById("wlInput").click();
document.getElementById("wlInput").onchange = async ev=>{
  const f = ev.target.files[0]; if (!f) return;
  try{
    const list = parseWorkList(await decodeText(f));
    if (!list.length) throw new Error("гҖҢз•ӘеҸ·гҖҚгҒ®еҲ—гҒҢиҰӢгҒӨгҒӢгӮҠгҒҫгҒӣгӮ“(1еҲ—зӣ®гҒӢгҖҢз•ӘеҸ·гҖҚеҲ—гҒ«ж•°еӯ—гӮ’е…ҘгӮҢгҒҰгҒҸгҒ гҒ•гҒ„)");
    pushUndo();
    state.workList = list;
    render(); renderSide();
    document.getElementById("hint").textContent = `дҪңе“ҒгғӘгӮ№гғҲ ${list.length}д»¶гӮ’иӘӯгҒҝиҫјгҒҝгҒҫгҒ—гҒҹ`;
  }catch(e){ alert("дҪңе“ҒгғӘгӮ№гғҲгҒ®иӘӯгҒҝиҫјгҒҝгҒ«еӨұж•—гҒ—гҒҫгҒ—гҒҹ: " + e.message); }
  ev.target.value = "";
};

/* дҪңе“Ғз”»еғҸгҒ®дёҖжӢ¬иӘӯгҒҝиҫјгҒҝ: гғ•гӮЎгӮӨгғ«еҗҚгҒ®з•ӘеҸ·вҶ’гғӘгӮ№гғҲгҒ®з•ӘеҸ·гҒ«еҜҫеҝңд»ҳгҒ‘гҖҒең§зё®гҒ—гҒҰдҝқеӯҳ */
document.getElementById("imgsBtn").onclick = ()=> document.getElementById("imgsInput").click();
document.getElementById("imgsInput").onchange = async ev=>{
  const files = [...ev.target.files]; if (!files.length) return;
  let ok = 0, skipped = [];
  for (const f of files){
    const no = normNo(f.name);
    if (!no){ skipped.push(f.name); continue; }
    try{ state.images[no] = await compressImage(f); ok++; }
    catch(e){ skipped.push(f.name); }
  }
  render(); renderSide();
  document.getElementById("hint").textContent =
    `дҪңе“Ғз”»еғҸ ${ok}/${files.length} д»¶гӮ’иӘӯгҒҝиҫјгҒҝгҒҫгҒ—гҒҹ` + (skipped.length ? `(з•ӘеҸ·гҒӘгҒ—/еӨұж•—: ${skipped.length}д»¶)` : "");
  ev.target.value = "";
};
document.getElementById("undoBtn").onclick = undo;
document.getElementById("redoBtn").onclick = redo;
document.getElementById("zoomIn").onclick = ()=> zoom(0.8);
document.getElementById("zoomOut").onclick = ()=> zoom(1.25);
document.getElementById("zoomFit").onclick = fitView;

window.addEventListener("resize", applyView);

/* ---- еҲқжңҹеҢ– ---- */
syncSheetUI(); render(); renderSide();
</script>
</body>
</html>
