<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>展覧会図面作成アプリ - プロトタイプ</title>
<style>
  :root{
    --ink:#1c1c1e;
    --paper:#fdfdfb;
    --grid:#e4e2da;
    --grid-major:#d0cdc2;
    --accent:#b3541e;      /* 朱 — 選択・作品番号 */
    --wall:#2b2b2e;
    --fixture:#8a8578;
    --case:#5c7c8a;        /* 可動ケース */
    --panel:#f3f1ea;
    --line:#c9c5b8;
    --radius:6px;
    font-size:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"Hiragino Kaku Gothic ProN","Yu Gothic UI","Yu Gothic","Meiryo",sans-serif;
    color:var(--ink);background:var(--panel);
    display:flex;flex-direction:column;overflow:hidden;
  }

  /* ── 上部バー ─────────────────────── */
  header{
    display:flex;align-items:center;gap:12px;
    padding:8px 14px;background:var(--ink);color:#f5f3ec;flex-wrap:wrap;
  }
  header h1{font-size:15px;font-weight:600;letter-spacing:.06em;margin-right:8px}
  header h1 small{font-weight:400;opacity:.6;margin-left:6px;letter-spacing:.1em}
  .hbtn{
    background:transparent;color:#f5f3ec;border:1px solid #55534c;
    border-radius:var(--radius);padding:5px 12px;cursor:pointer;font-size:13px;
  }
  .hbtn:hover{background:#33322f}
  .hbtn.primary{background:var(--accent);border-color:var(--accent)}
  .hbtn.primary:hover{filter:brightness(1.1)}
  header .spacer{flex:1}
  header select{
    background:#33322f;color:#f5f3ec;border:1px solid #55534c;
    border-radius:var(--radius);padding:5px 8px;font-size:13px;
  }
  header label{font-size:12px;opacity:.75}

  /* ── メインレイアウト ─────────────── */
  main{flex:1;display:flex;min-height:0}

  /* ツールバー */
  #toolbar{
    width:88px;background:#efede5;border-right:1px solid var(--line);
    display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:6px;
  }
  .tool{
    width:72px;padding:8px 4px;border:1px solid transparent;border-radius:var(--radius);
    background:transparent;cursor:pointer;font-size:11px;color:var(--ink);
    display:flex;flex-direction:column;align-items:center;gap:3px;
  }
  .tool span.ic{font-size:18px;line-height:1}
  .tool:hover{background:#e4e1d6}
  .tool.active{background:#fff;border-color:var(--accent);color:var(--accent);font-weight:600}
  #toolbar hr{width:56px;border:none;border-top:1px solid var(--line);margin:6px 0}

  /* キャンバス領域 */
  #canvasWrap{flex:1;position:relative;overflow:hidden;background:#dad7cc}
  svg#plan{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
  #zoomCtrl{
    position:absolute;left:12px;bottom:12px;display:flex;gap:4px;
    background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:4px;
  }
  #zoomCtrl button{border:none;background:transparent;width:28px;height:28px;cursor:pointer;font-size:15px;border-radius:4px}
  #zoomCtrl button:hover{background:var(--panel)}
  #hint{
    position:absolute;top:10px;left:50%;transform:translateX(-50%);
    background:rgba(28,28,30,.85);color:#f5f3ec;font-size:12px;
    padding:5px 14px;border-radius:20px;pointer-events:none;white-space:nowrap;
  }

  /* 右パネル */
  #side{
    width:280px;background:var(--paper);border-left:1px solid var(--line);
    display:flex;flex-direction:column;min-height:0;
  }
  #side h2{
    font-size:12px;letter-spacing:.12em;font-weight:600;color:#6d6a60;
    padding:12px 14px 6px;border-bottom:1px solid var(--line);
  }
  #props{padding:12px 14px;border-bottom:1px solid var(--line)}
  #props .empty{font-size:12px;color:#8c887c}
  .field{margin-bottom:8px}
  .field label{display:block;font-size:11px;color:#6d6a60;margin-bottom:2px}
  .field input,.field textarea{
    width:100%;padding:5px 7px;border:1px solid var(--line);border-radius:4px;
    font-size:13px;font-family:inherit;background:#fff;
  }
  .field .pair{display:flex;gap:6px}
  .field .pair input{flex:1}
  #props .del{
    margin-top:4px;width:100%;padding:6px;border:1px solid #c33;color:#c33;
    background:#fff;border-radius:4px;cursor:pointer;font-size:12px;
  }
  #props .del:hover{background:#c33;color:#fff}
  .sbtn{
    flex:1;padding:5px 7px;border:1px solid var(--line);background:#fff;
    border-radius:4px;cursor:pointer;font-size:12px;
  }
  .sbtn:hover{border-color:var(--accent);color:var(--accent)}
  #props .note{font-size:11px;color:#8c887c;margin-bottom:8px}
  #props select{
    width:100%;padding:5px 7px;border:1px solid var(--line);border-radius:4px;
    font-size:13px;font-family:inherit;background:#fff;
  }

  /* レイヤーバー */
  #layerBar{
    display:flex;flex-wrap:wrap;gap:4px 12px;padding:8px 14px;
    border-bottom:1px solid var(--line);font-size:12px;
  }
  #layerBar label{display:flex;align-items:center;gap:4px;cursor:pointer;color:var(--ink)}

  /* 作品リスト */
  #workListWrap{flex:1;overflow-y:auto}
  #workList{list-style:none}
  #workList li{
    display:flex;align-items:center;gap:8px;padding:7px 14px;
    border-bottom:1px solid #eee9dd;cursor:pointer;font-size:13px;
  }
  #workList li:hover{background:var(--panel)}
  #workList li.sel{background:#fbe9dc}
  #workList .num{
    flex:none;width:20px;height:20px;border-radius:50%;
    background:var(--accent);color:#fff;font-size:11px;
    display:flex;align-items:center;justify-content:center;font-weight:600;
  }
  #workList .meta{min-width:0;flex:1}
  #workList .meta .t{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  #workList .meta .s{font-size:11px;color:#8c887c}
  #workList .none{padding:14px;font-size:12px;color:#8c887c}
  #workList .ord{display:flex;flex-direction:column;gap:2px;flex:none}
  #workList .ord .mv{
    border:1px solid var(--line);background:#fff;border-radius:3px;
    font-size:8px;width:18px;height:14px;line-height:1;cursor:pointer;padding:0;color:#6d6a60;
  }
  #workList .ord .mv:hover{border-color:var(--accent);color:var(--accent)}
  #workList .ord .mv:disabled{opacity:.3;cursor:default}

  /* SVG内の要素スタイル */
  /* 注意: SVGはCSSがプレゼンテーション属性より優先されるため、
     font-size等はここに書かず属性側で指定する */
  .wall-line{stroke:var(--wall);stroke-linecap:square}
  .obj.selected .body{stroke:var(--accent);stroke-width:45}
  .badge circle{fill:var(--accent)}
  .badge text{fill:#fff;font-weight:600;text-anchor:middle;dominant-baseline:central}
  .obj text.lbl{fill:var(--ink);text-anchor:middle;pointer-events:none}
  .obj{cursor:move}
  #titleBlock text{fill:var(--ink)}
  #titleBlock .tb-head{fill:#6d6a60}
  #titleBlock .tb-title{font-weight:600}

  /* 印刷 */
  @media print{
    header,#toolbar,#side,#zoomCtrl,#hint{display:none!important}
    body{background:#fff}
    #canvasWrap{position:fixed;inset:0;background:#fff}
  }
</style>
</head>
<body>

<header>
  <h1>展覧会図面作成<small>プロトタイプ</small></h1>
  <label>縮尺
    <select id="scaleSel">
      <option value="50">1:50</option>
      <option value="100" selected>1:100</option>
      <option value="200">1:200</option>
    </select>
  </label>
  <label>用紙
    <select id="sheetSel" title="実寸出力プリセット: 用紙サイズ×縮尺で図面範囲が決まります">
      <option value="custom" selected>フリー (20×14m)</option>
      <option value="a4l">A4 横</option>
      <option value="a4p">A4 縦</option>
      <option value="a3l">A3 横</option>
      <option value="a3p">A3 縦</option>
    </select>
  </label>
  <button class="hbtn" id="undoBtn" title="元に戻す (Ctrl+Z)">↩ 元に戻す</button>
  <button class="hbtn" id="redoBtn" title="やり直し (Ctrl+Y / Ctrl+Shift+Z)">↪ やり直し</button>
  <div class="spacer"></div>
  <button class="hbtn" id="loadBtn">📂 読み込み</button>
  <button class="hbtn" id="saveBtn">💾 保存 (JSON)</button>
  <button class="hbtn" id="pngBtn">🖼 PNG書き出し</button>
  <button class="hbtn primary" id="printBtn">🖨 印刷実行</button>
  <input type="file" id="fileInput" accept=".json" hidden>
</header>

<main>
  <nav id="toolbar">
    <button class="tool active" data-tool="select"><span class="ic">↖</span>選択/移動</button>
    <button class="tool" data-tool="wall"><span class="ic">╱</span>壁を描く</button>
    <hr>
    <button class="tool" data-tool="work"><span class="ic">🖼</span>作品</button>
    <button class="tool" data-tool="case"><span class="ic">▣</span>可動ケース</button>
    <button class="tool" data-tool="fixture"><span class="ic">◻</span>展示台</button>
    <button class="tool" data-tool="text"><span class="ic">あ</span>テキスト</button>
    <hr>
    <button class="tool" data-tool="erase"><span class="ic">✕</span>削除</button>
  </nav>

  <div id="canvasWrap">
    <svg id="plan" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="zoomCtrl">
      <button id="zoomOut" title="縮小">−</button>
      <button id="zoomFit" title="全体表示">⌂</button>
      <button id="zoomIn" title="拡大">＋</button>
    </div>
    <div id="hint">ツールを選んで図面上をクリック/ドラッグ</div>
  </div>

  <aside id="side">
    <h2>レイヤー</h2>
    <div id="layerBar">
      <label><input type="checkbox" data-layer="room" checked>展示室図面</label>
      <label><input type="checkbox" data-layer="furniture" checked>ケース・展示台</label>
      <label><input type="checkbox" data-layer="work" checked>作品</label>
      <label><input type="checkbox" data-layer="text" checked>テキスト</label>
    </div>
    <h2>プロパティ</h2>
    <div id="props"><div class="empty">オブジェクトを選択すると編集できます</div></div>
    <h2>作品リスト</h2>
    <div id="workListWrap"><ul id="workList"></ul></div>
  </aside>
</main>

<script>
"use strict";
/* ============================================================
   展覧会図面作成アプリ(再構築版)
   単位: 内部座標は mm。表示は 0.1px/mm を基準にviewBoxで拡縮。
   ============================================================ */

const SVG_NS = "http://www.w3.org/2000/svg";
const svg = document.getElementById("plan");
const GRID = 500;            // グリッド 500mm
const WALL_T = 150;          // 壁厚 150mm
const SHEET = {w: 20000, h: 14000}; // 図面範囲(mm)。用紙プリセットで applySheet() が更新する
const PAPERS = {a4l:[297,210], a4p:[210,297], a3l:[420,297], a3p:[297,420]}; // 用紙実寸(mm)

/* ---- レイヤー構成 ----
   最背面: 展示室図面(state.rooms) → 壁 → ケース・展示台 → 作品 → テキスト(最前面)
   表示/非表示は layerVis(保存対象外のビュー状態) */
const layerVis = {room:true, furniture:true, work:true, text:true};
const layerOf = o => o.type==="work" ? 1 : o.type==="text" ? 2 : 0;

/* 展示室図面のデフォルト4面。img は読み込んだ図面画像(dataURL) */
function defaultRooms(){
  return {current:"", list:[
    {id:"r1a1", name:"展示室1-A（旧第1）", img:null, scale:100, dx:0, dy:0, op:70},
    {id:"r1a2", name:"展示室1-A（旧第2）", img:null, scale:100, dx:0, dy:0, op:70},
    {id:"r1b",  name:"展示室1-B",          img:null, scale:100, dx:0, dy:0, op:70},
    {id:"r2b",  name:"展示室2-B",          img:null, scale:100, dx:0, dy:0, op:70},
  ]};
}

/* 可動ケース・展示台のデフォルト在庫 [名称, 幅mm, 奥行mm, 台数] */
const CASE_DEFAULTS = [
  ["α",             2400, 1800,  2],
  ["β",             2400, 1200, 10],
  ["180角",         1800, 1800,  2],
  ["横長免震",      1800, 1000,  5],
  ["横長免震背景",  1800, 1000,  1],
  ["横長非免震",    1800, 1000,  1],
  ["横長非免震背景",1800, 1000,  2],
  ["行燈免震",      1000, 1000,  5],
  ["のぞき",        1800, 1000,  5],
];
const PED_DEFAULTS = [ // [幅mm, 奥行mm, 台数]
  [1530, 900, 18],
  [1800, 900, 12],
  [ 900, 900,  7],
  [2000, 2000, 2],
  [1200, 900, 30],
];

/* 印刷範囲(シート)の外に在庫を縦一列で並べる: ケースは左、展示台は右 */
function seedDefaults(){
  const objs = [], GAP = 300;
  let y = GAP;
  for (const [name,w,h,n] of CASE_DEFAULTS)
    for (let i=0;i<n;i++){
      objs.push({id:idSeq++, type:"case", x:-2000, y:y+h/2, rot:0, w, h, label:name});
      y += h + GAP;
    }
  y = GAP;
  for (const [w,h,n] of PED_DEFAULTS)
    for (let i=0;i<n;i++){
      objs.push({id:idSeq++, type:"fixture", x:SHEET.w+2000, y:y+h/2, rot:0, w, h,
        label:`${w/1000}×${h/1000}`});
      y += h + GAP;
    }
  return objs;
}

/* ---- 状態 ---- */
let idSeq = 1;
let state = {
  meta: {title:"(展覧会名未設定)", venue:"", author:"", date: today()},
  sheet: {preset:"custom"},
  rooms: defaultRooms(),
  walls: [],                // {id,x1,y1,x2,y2}
  objects: seedDefaults()   // {id,type:'work'|'case'|'fixture'|'text', x,y,w,h,rot, title,artist,note,label,img}
};
let tool = "select";
let selectedId = null;
let undoStack = [];
let redoStack = [];

/* 用紙サイズ×縮尺 → 図面範囲。A4横 1:100 なら 29.7m×21m の実空間が用紙に実寸で収まる */
function applySheet(){
  const preset = state.sheet?.preset || "custom";
  const paper = PAPERS[preset];
  if (!paper){ SHEET.w = 20000; SHEET.h = 14000; }
  else {
    const s = +document.getElementById("scaleSel").value;
    SHEET.w = paper[0] * s; SHEET.h = paper[1] * s;
  }
}
function syncSheetUI(){
  document.getElementById("sheetSel").value = PAPERS[state.sheet?.preset] ? state.sheet.preset : "custom";
  applySheet();
}

/* ---- ビュー(ズーム/パン) ---- */
/* 初期表示はシート+左右の在庫列(印刷範囲外)が見える範囲 */
let view = {x:-4400, y:-1000, w: SHEET.w+8800, h: SHEET.h+2000};
function fitView(){
  const m = Math.max(SHEET.w, SHEET.h) * 0.05;
  view = {x:-m, y:-m, w:SHEET.w+m*2, h:SHEET.h+m*2};
  applyView();
}
function applyView(){
  const el = svg.getBoundingClientRect();
  const ar = el.width / el.height;
  let {x,y,w,h} = view;
  if (w/h < ar) { const nw = h*ar; x -= (nw-w)/2; w = nw; }
  else { const nh = w/ar; y -= (nh-h)/2; h = nh; }
  svg.setAttribute("viewBox", `${x} ${y} ${w} ${h}`);
}
function zoom(f, cx, cy){
  const pt = clientToPlan(cx ?? innerWidth/2, cy ?? innerHeight/2);
  view.w *= f; view.h *= f;
  view.x = pt.x - (pt.x - view.x)*f;
  view.y = pt.y - (pt.y - view.y)*f;
  applyView(); render();
}
function clientToPlan(cx, cy){
  const p = svg.createSVGPoint(); p.x = cx; p.y = cy;
  return p.matrixTransform(svg.getScreenCTM().inverse());
}
function snap(v){ return Math.round(v / (GRID/2)) * (GRID/2); }
/* 既存の壁の端点が近くにあればそこへ吸着(壁の連結)。なければグリッドスナップ */
function snapWallPoint(p, excludeId){
  const R = 400; // 吸着半径(mm)
  let best = null, bd = R;
  for (const w of state.walls){
    if (w.id === excludeId) continue;
    for (const [ex,ey] of [[w.x1,w.y1],[w.x2,w.y2]]){
      const d = Math.hypot(p.x-ex, p.y-ey);
      if (d < bd){ bd = d; best = {x:ex, y:ey, joined:true}; }
    }
  }
  return best || {x:snap(p.x), y:snap(p.y), joined:false};
}
function today(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }

/* ---- 履歴 ---- */
function pushUndo(){
  undoStack.push(JSON.stringify(state));
  if (undoStack.length > 50) undoStack.shift();
  redoStack.length = 0; // 新しい操作でやり直し履歴は無効になる
}
function undo(){
  if (!undoStack.length) return;
  redoStack.push(JSON.stringify(state));
  state = JSON.parse(undoStack.pop());
  afterHistory();
}
function redo(){
  if (!redoStack.length) return;
  undoStack.push(JSON.stringify(state));
  state = JSON.parse(redoStack.pop());
  afterHistory();
}
function afterHistory(){
  selectedId = null; syncSheetUI(); render(); renderSide();
}

/* ---- 描画 ---- */
function el(name, attrs, parent){
  const e = document.createElementNS(SVG_NS, name);
  for (const k in attrs) e.setAttribute(k, attrs[k]);
  if (parent) parent.appendChild(e);
  return e;
}

function render(){
  svg.innerHTML = "";

  // 用紙
  el("rect",{x:0,y:0,width:SHEET.w,height:SHEET.h,fill:"var(--paper)",stroke:"var(--ink)","stroke-width":30}, svg);

  // グリッド
  const g = el("g",{}, svg);
  for (let x=0; x<=SHEET.w; x+=GRID)
    el("line",{x1:x,y1:0,x2:x,y2:SHEET.h,stroke: x%(GRID*4)?"var(--grid)":"var(--grid-major)","stroke-width":x%(GRID*4)?6:10}, g);
  for (let y=0; y<=SHEET.h; y+=GRID)
    el("line",{x1:0,y1:y,x2:SHEET.w,y2:y,stroke: y%(GRID*4)?"var(--grid)":"var(--grid-major)","stroke-width":y%(GRID*4)?6:10}, g);

  // 展示室図面(最背面レイヤー)
  const room = state.rooms?.list.find(r=>r.id===state.rooms.current);
  if (layerVis.room && room?.img){
    el("image",{href:room.img, x:room.dx||0, y:room.dy||0,
      width:SHEET.w*(room.scale??100)/100, height:SHEET.h*(room.scale??100)/100,
      preserveAspectRatio:"xMinYMin meet", opacity:(room.op??70)/100,
      "pointer-events":"none"}, svg);
  }

  // 壁
  for (const w of state.walls){
    const ln = el("line",{x1:w.x1,y1:w.y1,x2:w.x2,y2:w.y2,"stroke-width":WALL_T,class:"wall-line","data-id":w.id}, svg);
    if (w.id === selectedId) ln.style.stroke = "var(--accent)"; // inline styleでCSSクラスに勝たせる
  }

  // オブジェクト: レイヤー順(ケース・展示台 → 作品 → テキスト)に描画。安定ソートなので同レイヤー内は配列順
  const layerShown = o => [layerVis.furniture, layerVis.work, layerVis.text][layerOf(o)];
  let workNum = 0;
  for (const o of [...state.objects].sort((a,b)=>layerOf(a)-layerOf(b))){
    if (o.type === "work") workNum++;
    if (!layerShown(o)) continue;
    const grp = el("g",{class:"obj"+(o.id===selectedId?" selected":""),"data-id":o.id,
      transform:`translate(${o.x},${o.y}) rotate(${o.rot||0})`}, svg);

    if (o.type === "work"){
      el("rect",{class:"body",x:-o.w/2,y:-o.h/2,width:o.w,height:o.h,fill:"#fff",stroke:"var(--ink)","stroke-width":20}, grp);
      if (o.img)
        el("image",{href:o.img,x:-o.w/2,y:-o.h/2,width:o.w,height:o.h,
          preserveAspectRatio:"xMidYMid meet","pointer-events":"none"}, grp);
      else
        el("line",{x1:-o.w/2,y1:o.h/2,x2:o.w/2,y2:-o.h/2,stroke:"#bbb","stroke-width":10}, grp);
      const b = el("g",{class:"badge",transform:`translate(0,${-o.h/2-260})`}, grp);
      el("circle",{r:200}, b);
      const t = el("text",{}, b); t.textContent = workNum;
      t.setAttribute("font-size", 220);
      const lbl = el("text",{class:"lbl",y:o.h/2+320,"font-size":260}, grp);
      lbl.textContent = o.title || "無題";
    }
    else if (o.type === "case"){
      el("rect",{class:"body",x:-o.w/2,y:-o.h/2,width:o.w,height:o.h,fill:"var(--case)","fill-opacity":.18,stroke:"var(--case)","stroke-width":25}, grp);
      const lbl = el("text",{class:"lbl","font-size":240}, grp);
      lbl.textContent = o.label || "ケース";
    }
    else if (o.type === "fixture"){
      el("rect",{class:"body",x:-o.w/2,y:-o.h/2,width:o.w,height:o.h,fill:"var(--fixture)","fill-opacity":.25,stroke:"var(--fixture)","stroke-width":20}, grp);
      const lbl = el("text",{class:"lbl","font-size":240}, grp);
      lbl.textContent = o.label || "展示台";
    }
    else if (o.type === "text"){
      const t = el("text",{class:"lbl body","font-size":320,"font-weight":600}, grp);
      t.textContent = o.label || "テキスト";
      el("rect",{x:-800,y:-260,width:1600,height:520,fill:"transparent"}, grp); // クリック領域
    }
  }

  drawTitleBlock();
  applyView();
}

function drawTitleBlock(){
  const W = 5200, H = 1500;
  const x = SHEET.w - W - 300, y = SHEET.h - H - 300;
  const g = el("g",{id:"titleBlock"}, svg);
  el("rect",{x,y,width:W,height:H,fill:"#fff",stroke:"var(--ink)","stroke-width":25}, g);
  el("line",{x1:x,y1:y+520,x2:x+W,y2:y+520,stroke:"var(--ink)","stroke-width":15}, g);
  el("line",{x1:x+W/2,y1:y+520,x2:x+W/2,y2:y+H,stroke:"var(--ink)","stroke-width":15}, g);

  const put = (tx,ty,str,cls,size)=>{ const t = el("text",{x:tx,y:ty,class:cls,"font-size":size}, g); t.textContent = str; };
  put(x+140, y+250, "展覧会平面図", "tb-head", 220);
  put(x+140, y+430, state.meta.title, "tb-title", 300);
  put(x+140, y+700, "会場", "tb-head", 190);
  put(x+140, y+950, state.meta.venue || "—", "", 230);
  put(x+140, y+1220, `作成: ${state.meta.author || "—"}`, "", 200);
  put(x+W/2+140, y+700, "縮尺 / 日付", "tb-head", 190);
  put(x+W/2+140, y+950, `1:${document.getElementById("scaleSel").value}`, "", 230);
  put(x+W/2+140, y+1220, state.meta.date, "", 200);
}

/* ---- サイドパネル ---- */
function renderSide(){
  const props = document.getElementById("props");
  const obj = state.objects.find(o=>o.id===selectedId);
  const wall = state.walls.find(w=>w.id===selectedId);

  if (!obj && !wall){
    const rooms = state.rooms, cur = rooms.list.find(r=>r.id===rooms.current);
    let rhtml = `<div class="field"><label>展示室図面(最背面レイヤー)</label>
      <select id="roomSel"><option value="">(なし)</option>
      ${rooms.list.map(r=>`<option value="${r.id}" ${r.id===rooms.current?"selected":""}>${esc(r.name)}${r.img?" ✓":""}</option>`).join("")}
      </select></div>`;
    if (cur){
      rhtml += `<div class="field"><div class="pair">
        <button class="sbtn" id="roomImgBtn">${cur.img?"図面画像を差し替え":"📂 図面画像を読み込み"}</button>
        ${cur.img?`<button class="sbtn" id="roomImgDel">外す</button>`:""}
      </div></div>
      <input type="file" id="roomFile" accept="image/*" hidden>`;
      if (cur.img){
        rhtml += `<div class="field"><label>倍率% / 透明度%</label><div class="pair">
          <input id="rScale" type="number" step="5" value="${cur.scale??100}">
          <input id="rOp" type="number" step="5" min="0" max="100" value="${cur.op??70}"></div></div>
        <div class="field"><label>位置 X / Y (mm)</label><div class="pair">
          <input id="rDx" type="number" step="100" value="${cur.dx||0}">
          <input id="rDy" type="number" step="100" value="${cur.dy||0}"></div></div>`;
      } else {
        rhtml += `<div class="note">※PDFはPNG/JPG画像に変換してから読み込んでください</div>`;
      }
    }
    props.innerHTML = rhtml +
      `<div class="empty" style="margin:10px 0 4px">オブジェクトを選択すると編集できます</div>
      <div class="field" style="margin-top:6px"><label>展覧会名</label><input id="mTitle" value="${esc(state.meta.title)}"></div>
      <div class="field"><label>会場</label><input id="mVenue" value="${esc(state.meta.venue)}"></div>
      <div class="field"><label>作成者</label><input id="mAuthor" value="${esc(state.meta.author)}"></div>`;
    for (const [id,key] of [["mTitle","title"],["mVenue","venue"],["mAuthor","author"]])
      document.getElementById(id).oninput = e => { state.meta[key] = e.target.value; render(); };

    document.getElementById("roomSel").onchange = e => {
      pushUndo(); state.rooms.current = e.target.value; render(); renderSide();
    };
    const rBtn = document.getElementById("roomImgBtn"), rFile = document.getElementById("roomFile");
    if (rBtn) rBtn.onclick = ()=> rFile.click();
    if (rFile) rFile.onchange = e => {
      const f = e.target.files[0]; if (!f) return;
      const rd = new FileReader();
      rd.onload = ()=>{ pushUndo(); cur.img = rd.result; render(); renderSide(); };
      rd.readAsDataURL(f);
    };
    const rDel = document.getElementById("roomImgDel");
    if (rDel) rDel.onclick = ()=>{ pushUndo(); cur.img = null; render(); renderSide(); };
    for (const [id,key] of [["rScale","scale"],["rOp","op"],["rDx","dx"],["rDy","dy"]]){
      const inp = document.getElementById(id);
      if (inp) inp.oninput = e => { cur[key] = +e.target.value||0; render(); };
    }
  }
  else if (wall){
    const len = Math.hypot(wall.x2-wall.x1, wall.y2-wall.y1);
    props.innerHTML = `<div class="field"><label>壁 — 長さ</label><input value="${(len/1000).toFixed(2)} m" readonly></div>
      <button class="del" id="delBtn">この壁を削除</button>`;
    document.getElementById("delBtn").onclick = deleteSelected;
  }
  else {
    let html = "";
    if (obj.type === "work"){
      html += fld("作品名","title",obj.title) + fld("作家名","artist",obj.artist);
      html += `<div class="field"><label>幅 × 奥行 (mm)</label><div class="pair">
        <input id="pW" type="number" step="10" value="${obj.w}">
        <input id="pH" type="number" step="10" value="${obj.h}"></div></div>`;
      html += `<div class="field"><label>画像</label><div class="pair">
        <button class="sbtn" id="pImgBtn">${obj.img?"画像を差し替え":"📂 画像を選択"}</button>
        ${obj.img?`<button class="sbtn" id="pImgDel">外す</button>`:""}
        </div></div><input type="file" id="pImgFile" accept="image/*" hidden>`;
      html += `<div class="field"><label>備考</label><textarea id="pNote" rows="2">${esc(obj.note||"")}</textarea></div>`;
    } else if (obj.type === "fixture" || obj.type === "case"){
      html += fld("名称","label",obj.label);
      html += `<div class="field"><label>幅 × 奥行 (mm)</label><div class="pair">
        <input id="pW" type="number" step="10" value="${obj.w}">
        <input id="pH" type="number" step="10" value="${obj.h}"></div></div>`;
    } else {
      html += fld("テキスト","label",obj.label);
    }
    html += `<div class="field"><label>回転 (度)</label><input id="pRot" type="number" step="15" value="${obj.rot||0}"></div>`;
    html += `<button class="del" id="delBtn">削除</button>`;
    props.innerHTML = html;

    props.querySelectorAll("[data-key]").forEach(inp=>{
      inp.oninput = e => { obj[inp.dataset.key] = e.target.value; render(); renderList(); };
    });
    const pW = document.getElementById("pW"), pH = document.getElementById("pH");
    if (pW) pW.oninput = e => { obj.w = Math.max(50, +e.target.value||obj.w); render(); };
    if (pH) pH.oninput = e => { obj.h = Math.max(50, +e.target.value||obj.h); render(); };
    const pR = document.getElementById("pRot");
    pR.oninput = e => { obj.rot = +e.target.value||0; render(); };
    const pN = document.getElementById("pNote");
    if (pN) pN.oninput = e => { obj.note = e.target.value; };
    const pImgBtn = document.getElementById("pImgBtn"), pImgFile = document.getElementById("pImgFile");
    if (pImgBtn) pImgBtn.onclick = ()=> pImgFile.click();
    if (pImgFile) pImgFile.onchange = e => {
      const f = e.target.files[0]; if (!f) return;
      const rd = new FileReader();
      rd.onload = ()=>{ pushUndo(); obj.img = rd.result; render(); renderSide(); };
      rd.readAsDataURL(f);
    };
    const pImgDel = document.getElementById("pImgDel");
    if (pImgDel) pImgDel.onclick = ()=>{ pushUndo(); delete obj.img; render(); renderSide(); };
    document.getElementById("delBtn").onclick = deleteSelected;
  }
  renderList();
}
function fld(label,key,val){
  return `<div class="field"><label>${label}</label><input data-key="${key}" value="${esc(val||"")}"></div>`;
}
function esc(s){ return String(s??"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }

function renderList(){
  const ul = document.getElementById("workList");
  const works = state.objects.filter(o=>o.type==="work");
  if (!works.length){ ul.innerHTML = `<li class="none" style="cursor:default">作品ツールで図面上に配置してください</li>`; return; }
  ul.innerHTML = works.map((w,i)=>`
    <li data-id="${w.id}" class="${w.id===selectedId?"sel":""}">
      <span class="num">${i+1}</span>
      <span class="meta"><div class="t">${esc(w.title||"無題")}</div>
      <div class="s">${esc(w.artist||"作家未設定")} ・ ${w.w}×${w.h}mm</div></span>
      <span class="ord">
        <button class="mv" data-mv="-1" title="番号を上へ" ${i===0?"disabled":""}>▲</button>
        <button class="mv" data-mv="1" title="番号を下へ" ${i===works.length-1?"disabled":""}>▼</button>
      </span>
    </li>`).join("");
  ul.querySelectorAll("li[data-id]").forEach(li=>{
    li.onclick = ()=>{ selectedId = +li.dataset.id; render(); renderSide(); };
    li.querySelectorAll(".mv").forEach(b=>{
      b.onclick = e=>{ e.stopPropagation(); moveWork(+li.dataset.id, +b.dataset.mv); };
    });
  });
}

/* 作品番号の並べ替え: objects配列内で隣の作品と位置を入れ替える(採番は配列順) */
function moveWork(id, dir){
  const works = state.objects.filter(o=>o.type==="work");
  const i = works.findIndex(w=>w.id===id), j = i + dir;
  if (i < 0 || j < 0 || j >= works.length) return;
  pushUndo();
  const a = state.objects.indexOf(works[i]), b = state.objects.indexOf(works[j]);
  [state.objects[a], state.objects[b]] = [state.objects[b], state.objects[a]];
  render(); renderSide();
}

function deleteSelected(){
  if (selectedId == null) return;
  pushUndo();
  state.objects = state.objects.filter(o=>o.id!==selectedId);
  state.walls = state.walls.filter(w=>w.id!==selectedId);
  selectedId = null; render(); renderSide();
}

/* ---- ポインタ操作 ---- */
let drag = null; // {mode:'wall'|'move'|'pan', ...}
const pointers = new Map(); // アクティブなポインタ(ピンチズーム判定用)
let pinch = null;           // {d,cx,cy} 直前フレームの2本指間距離と中点

svg.addEventListener("pointerdown", ev=>{
  svg.setPointerCapture(ev.pointerId);
  pointers.set(ev.pointerId, {x:ev.clientX, y:ev.clientY});
  if (pointers.size === 2){
    // 2本目の指が触れたらピンチ開始。描きかけの壁は破棄する
    if (drag?.mode === "wall"){ state.walls.pop(); undoStack.pop(); render(); }
    drag = null;
    const [p1,p2] = [...pointers.values()];
    pinch = {d: Math.hypot(p1.x-p2.x, p1.y-p2.y), cx:(p1.x+p2.x)/2, cy:(p1.y+p2.y)/2};
    return;
  }
  if (pointers.size > 2) return;
  const p = clientToPlan(ev.clientX, ev.clientY);
  const hit = ev.target.closest("[data-id]");

  if (tool === "wall"){
    pushUndo();
    const sp = snapWallPoint(p);
    const w = {id: idSeq++, x1:sp.x, y1:sp.y, x2:sp.x, y2:sp.y};
    state.walls.push(w);
    drag = {mode:"wall", wall:w};
    return;
  }
  if (tool === "work" || tool === "case" || tool === "fixture" || tool === "text"){
    pushUndo();
    const defaults = {
      work:   {w:1200, h:100, title:"", artist:""},
      case:   {w:1800, h:1000, label:"ケース"},
      fixture:{w:900, h:900, label:"展示台"},
      text:   {w:0, h:0, label:"テキスト"}
    }[tool];
    const o = {id:idSeq++, type:tool, x:snap(p.x), y:snap(p.y), rot:0, ...defaults};
    state.objects.push(o);
    selectedId = o.id;
    setTool("select");
    render(); renderSide();
    return;
  }
  if (tool === "erase"){
    if (hit){ selectedId = +hit.dataset.id; deleteSelected(); }
    return;
  }
  // select
  if (hit){
    selectedId = +hit.dataset.id;
    const obj = state.objects.find(o=>o.id===selectedId);
    if (obj){ pushUndo(); drag = {mode:"move", obj, dx:p.x-obj.x, dy:p.y-obj.y}; }
    render(); renderSide();
  } else {
    selectedId = null;
    drag = {mode:"pan", sx:ev.clientX, sy:ev.clientY, view:{...view}};
    render(); renderSide();
  }
});

svg.addEventListener("pointermove", ev=>{
  if (pointers.has(ev.pointerId)) pointers.set(ev.pointerId, {x:ev.clientX, y:ev.clientY});
  if (pinch && pointers.size >= 2){
    const [p1,p2] = [...pointers.values()];
    const d = Math.hypot(p1.x-p2.x, p1.y-p2.y);
    const cx = (p1.x+p2.x)/2, cy = (p1.y+p2.y)/2;
    if (d > 0 && pinch.d > 0) zoom(pinch.d / d, cx, cy); // 指を広げる→拡大
    const scale = view.w / svg.getBoundingClientRect().width;
    view.x -= (cx - pinch.cx) * scale;
    view.y -= (cy - pinch.cy) * scale;
    applyView();
    pinch = {d, cx, cy};
    return;
  }
  if (!drag) return;
  const p = clientToPlan(ev.clientX, ev.clientY);
  if (drag.mode === "wall"){
    const sp = snapWallPoint(p, drag.wall.id);
    let x2 = sp.x, y2 = sp.y;
    if (!sp.joined && !ev.shiftKey){ // 端点連結時以外は直交スナップ、Shiftで自由角度
      if (Math.abs(x2-drag.wall.x1) > Math.abs(y2-drag.wall.y1)) y2 = drag.wall.y1;
      else x2 = drag.wall.x1;
    }
    drag.wall.x2 = x2; drag.wall.y2 = y2;
    render();
  }
  else if (drag.mode === "move"){
    drag.obj.x = snap(p.x - drag.dx);
    drag.obj.y = snap(p.y - drag.dy);
    render();
  }
  else if (drag.mode === "pan"){
    const scale = view.w / svg.getBoundingClientRect().width;
    view.x = drag.view.x - (ev.clientX - drag.sx)*scale;
    view.y = drag.view.y - (ev.clientY - drag.sy)*scale;
    applyView();
  }
});

svg.addEventListener("pointerup", ev=>{
  pointers.delete(ev.pointerId);
  if (pointers.size < 2) pinch = null;
  if (drag?.mode === "wall"){
    const w = drag.wall;
    if (w.x1===w.x2 && w.y1===w.y2){ state.walls.pop(); undoStack.pop(); } // 長さ0は破棄
    render();
  }
  drag = null;
});
svg.addEventListener("pointercancel", ev=>{
  pointers.delete(ev.pointerId);
  if (pointers.size < 2) pinch = null;
  drag = null;
});

svg.addEventListener("wheel", ev=>{
  ev.preventDefault();
  zoom(ev.deltaY > 0 ? 1.1 : 0.9, ev.clientX, ev.clientY);
},{passive:false});

/* ---- ツール切替 ---- */
function setTool(t){
  tool = t;
  document.querySelectorAll(".tool").forEach(b=>b.classList.toggle("active", b.dataset.tool===t));
  const hints = {
    select:"クリックで選択、ドラッグで移動。空白ドラッグで画面移動",
    wall:"ドラッグで壁を描画(Shiftで自由角度、既存の壁の端点に近づけると連結)",
    work:"クリックで作品を配置 → 右パネルで作品名・サイズ・画像を設定",
    case:"クリックで可動ケースを配置(在庫は印刷範囲の左外に一覧あり)",
    fixture:"クリックで展示台を配置(在庫は印刷範囲の右外に一覧あり)",
    text:"クリックでテキストを配置",
    erase:"クリックしたオブジェクトを削除"
  };
  document.getElementById("hint").textContent = hints[t];
}
document.querySelectorAll(".tool").forEach(b=> b.onclick = ()=> setTool(b.dataset.tool));

/* ---- レイヤー表示切替 ---- */
document.querySelectorAll("#layerBar input").forEach(cb=>{
  cb.onchange = ()=>{ layerVis[cb.dataset.layer] = cb.checked; render(); };
});

/* ---- キーボード ---- */
window.addEventListener("keydown", ev=>{
  if (ev.target.matches("input,textarea")) return;
  if ((ev.ctrlKey||ev.metaKey) && ev.key.toLowerCase()==="z" && !ev.shiftKey){ ev.preventDefault(); undo(); }
  else if ((ev.ctrlKey||ev.metaKey) && (ev.key.toLowerCase()==="y" || (ev.key.toLowerCase()==="z" && ev.shiftKey))){ ev.preventDefault(); redo(); }
  else if (ev.key==="Delete" || ev.key==="Backspace"){ deleteSelected(); }
  else if (ev.key==="Escape"){ selectedId=null; setTool("select"); render(); renderSide(); }
});

/* ---- 保存 / 読み込み / 書き出し ---- */
document.getElementById("saveBtn").onclick = ()=>{
  const blob = new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `${state.meta.title||"floorplan"}_${state.meta.date}.json`;
  a.click(); URL.revokeObjectURL(a.href);
};
document.getElementById("loadBtn").onclick = ()=> document.getElementById("fileInput").click();
document.getElementById("fileInput").onchange = async ev=>{
  const f = ev.target.files[0]; if (!f) return;
  try{
    const data = JSON.parse(await f.text());
    if (!data.walls || !data.objects) throw new Error("形式が違います");
    pushUndo();
    state = data;
    if (!state.sheet) state.sheet = {preset:"custom"}; // 旧形式JSONとの互換
    if (!state.rooms) state.rooms = defaultRooms();
    idSeq = Math.max(0, ...state.walls.map(w=>w.id), ...state.objects.map(o=>o.id)) + 1;
    selectedId = null; syncSheetUI(); render(); renderSide();
  }catch(e){ alert("読み込みに失敗しました: " + e.message); }
  ev.target.value = "";
};
document.getElementById("pngBtn").onclick = ()=>{
  const clone = svg.cloneNode(true);
  clone.setAttribute("viewBox", `-300 -300 ${SHEET.w+600} ${SHEET.h+600}`);
  clone.setAttribute("width", 2400);
  clone.setAttribute("height", Math.round(2400*SHEET.h/SHEET.w));
  // 外部CSSはシリアライズされないため、必要なスタイルをSVG内に埋め込む
  const css = getComputedStyle(document.documentElement);
  const v = name => css.getPropertyValue(name).trim();
  const styleTag = document.createElementNS(SVG_NS, "style");
  styleTag.textContent = `
    .wall-line{stroke:${v("--wall")};stroke-linecap:square}
    .badge circle{fill:${v("--accent")}}
    .badge text{fill:#fff;font-weight:600;text-anchor:middle;dominant-baseline:central}
    .obj text.lbl{fill:${v("--ink")};text-anchor:middle}
    #titleBlock text{fill:${v("--ink")}}
    #titleBlock .tb-head{fill:#6d6a60}
    #titleBlock .tb-title{font-weight:600}
    text{font-family:sans-serif}`;
  clone.insertBefore(styleTag, clone.firstChild);
  let str = new XMLSerializer().serializeToString(clone);
  for (const v of ["--paper","--ink","--grid","--grid-major","--accent","--wall","--fixture","--case"])
    str = str.replaceAll(`var(${v})`, css.getPropertyValue(v).trim());
  str = str.replace("<svg", `<svg style="font-family:sans-serif"`);
  const img = new Image();
  img.onload = ()=>{
    const c = document.createElement("canvas");
    c.width = 2400; c.height = Math.round(2400*SHEET.h/SHEET.w);
    const ctx = c.getContext("2d");
    ctx.fillStyle = "#fff"; ctx.fillRect(0,0,c.width,c.height);
    ctx.drawImage(img,0,0,c.width,c.height);
    const a = document.createElement("a");
    a.href = c.toDataURL("image/png");
    a.download = `${state.meta.title||"floorplan"}.png`;
    a.click();
  };
  img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(str);
};
document.getElementById("printBtn").onclick = ()=>{
  const prev = {...view};
  view = {x:-300,y:-300,w:SHEET.w+600,h:SHEET.h+600}; applyView();
  window.print();
  view = prev; applyView();
};
document.getElementById("scaleSel").onchange = ()=>{ applySheet(); fitView(); render(); };
document.getElementById("sheetSel").onchange = ev=>{
  pushUndo();
  state.sheet = {preset: ev.target.value};
  applySheet(); fitView(); render();
};
document.getElementById("undoBtn").onclick = undo;
document.getElementById("redoBtn").onclick = redo;
document.getElementById("zoomIn").onclick = ()=> zoom(0.8);
document.getElementById("zoomOut").onclick = ()=> zoom(1.25);
document.getElementById("zoomFit").onclick = fitView;

window.addEventListener("resize", applyView);

/* ---- 初期化 ---- */
syncSheetUI(); render(); renderSide();
</script>
</body>
</html>
